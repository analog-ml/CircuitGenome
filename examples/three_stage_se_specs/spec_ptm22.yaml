# Feasible three-stage single-ended op-amp spec for PTM 22 nm HP bulk.
# Technology: ptm22, circuitgenome/sizer/config/tech_ptm22.yaml
# Supply: 0.8 V, 15 µA bias current. 3-stage spec applies to both NMC and RNMC variants.
# Targets assume the highest-gain load variant (active-mirror / folded-cascode); resistor/simple-CS loads need ~6 dB lower gain.
#
# Usage:
#   circuitgenome size circuits/three_stage_opamp_nmc_single_ended/circuit_0001_flat.ckt \
#     --topology three_stage_opamp_nmc_single_ended \
#     --spec examples/three_stage_se_specs/spec_ptm22.yaml \
#     --tech ptm22

vdd: 0.8            # V — positive supply
vss: 0.0            # V — ground
ibias: 1.5e-5      # A — input bias current (15 µA)
cl: 2.0e-12        # F — output load capacitance

second_stage_current_ratio: 2.5   # iDS_2 = ratio × ibias
third_stage_current_ratio: 5.0    # iDS_3 = ratio × ibias

# DC and frequency performance
gain_min_db: 65           # dB — minimum open-loop DC gain
gbw_min_hz: 2.5e+6        # Hz — minimum unity-gain bandwidth (2.5 MHz)
phase_margin_min_deg: 60  # °  — minimum phase margin
slew_rate_min_vps: 1.625e+6  # V/s — minimum slew rate (ibias / Cc)

# Power and swing
power_max_w: 5.0e-4      # W  — maximum total quiescent power
output_swing_max_v: 0.65  # V  — 0.15 V headroom from VDD
output_swing_min_v: 0.15   # V  — 0.15 V headroom from VSS
