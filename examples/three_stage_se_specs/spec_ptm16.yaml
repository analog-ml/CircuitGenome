# Feasible three-stage single-ended op-amp spec for PTM 16 nm bulk.
# Technology: ptm16, circuitgenome/sizer/config/tech_ptm16.yaml
#   NOTE: PTM 16 nm bulk is a PREDICTIVE planar extrapolation;
#   real 16 nm silicon is FinFET. Use for exploration only.
# Supply: 0.7 V, 10 µA bias current.  3-stage spec applies to both NMC and RNMC variants.
#
# Usage:
#   circuitgenome size circuits/three_stage_opamp_nmc_single_ended/circuit_0001_flat.ckt \
#     --topology three_stage_opamp_nmc_single_ended \
#     --spec examples/three_stage_se_specs/spec_ptm16.yaml \
#     --tech ptm16

vdd: 0.7            # V — positive supply
vss: 0.0            # V — ground
ibias: 10.0e-6      # A — input bias current
cl: 2.0e-12       # F — output load capacitance

second_stage_current_ratio: 2.5   # iDS_2 = ratio × ibias = 25 µA
third_stage_current_ratio: 5.0    # iDS_3 = ratio × ibias = 50 µA

# DC and frequency performance
gain_min_db: 60           # dB — minimum open-loop DC gain
gbw_min_hz: 2.5e+6        # Hz — minimum unity-gain bandwidth (2.5 MHz)
phase_margin_min_deg: 60  # °  — minimum phase margin
slew_rate_min_vps: 5.0e+5  # V/s — minimum slew rate (ibias / Cc)

# Power and swing
power_max_w: 5.0e-4      # W  — maximum total quiescent power
output_swing_max_v: 0.55   # V  — 0.15 V headroom from VDD
output_swing_min_v: 0.15    # V  — 0.15 V headroom from VSS
