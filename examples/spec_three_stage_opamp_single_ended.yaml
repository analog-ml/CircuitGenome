# Performance specification for a three-stage single-ended (NMC) op-amp.
# Technology: generic_parameterized (0.25µm-like), see circuitgenome/sizer/config/tech_generic.yaml
# Supply: 5 V single supply, 10 µA bias current
#
# Three-stage cascade with nested Miller compensation: outer cap Cc1 (set from
# SR/GBW) and inner cap Cc2 = Cc1/4 (Eschauzier/Huijsing heuristic, applied
# automatically by the sizer).  The phase budget is split between the two
# non-dominant poles, so the high target gain below is delivered by gm3.
#
# Usage:
#   circuitgenome size circuits/three_stage_opamp_nmc_single_ended/circuit_0001_flat.ckt \
#     --topology three_stage_opamp_nmc_single_ended \
#     --spec examples/spec_three_stage_opamp_single_ended.yaml

vdd: 5.0          # V — positive supply
vss: 0.0          # V — negative supply / ground
ibias: 10.0e-6    # A — input bias current (tail carries ibias, each input device ibias/2)
cl: 20.0e-12      # F — output load capacitance

second_stage_current_ratio: 2.5   # iDS_2 = ratio × ibias = 25 µA
third_stage_current_ratio: 5.0    # iDS_3 = ratio × ibias = 50 µA

# DC and frequency performance
gain_min_db: 100          # dB — minimum open-loop DC gain (three-stage target)
gbw_min_hz: 2.5e+6        # Hz — minimum unity-gain bandwidth (2.5 MHz)
phase_margin_min_deg: 60  # °  — minimum phase margin (split between two non-dominant poles)
slew_rate_min_vps: 3.5e+6 # V/s — minimum slew rate (ibias / Cc1) (3.5 V/µs)

# Power and swing
power_max_w: 1.0e-3       # W  — maximum total quiescent power
output_swing_max_v: 4.6   # V  — maximum output voltage (0.4 V headroom from VDD)
output_swing_min_v: 0.4   # V  — minimum output voltage (0.4 V headroom from VSS)
