# Feasible one-stage op-amp spec for generic_parameterized.
# Technology: generic, circuitgenome/sizer/config/tech_generic.yaml
# Supply: 5.0 V, 10 µA bias current.  One-stage: no Miller cap, so GBW/PM/SR are not modelled.
#
# Usage:
#   circuitgenome size circuits/one_stage_opamp/circuit_0001_flat.ckt \
#     --topology one_stage_opamp \
#     --spec examples/one_stage_specs/spec_generic.yaml \
#     --tech generic

vdd: 5.0            # V — positive supply
vss: 0.0            # V — ground
ibias: 10.0e-6      # A — input bias current
cl: 20.0e-12       # F — output load capacitance

# DC and frequency performance
gain_min_db: 40           # dB — minimum open-loop DC gain

# Power and swing
power_max_w: 1.0e-3      # W  — maximum total quiescent power
output_swing_max_v: 4.0   # V  — 1.0 V headroom from VDD
output_swing_min_v: 1.0    # V  — 1.0 V headroom from VSS
