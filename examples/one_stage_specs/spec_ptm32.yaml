# Feasible one-stage op-amp spec for PTM 32 nm HP bulk.
# Technology: ptm32, circuitgenome/sizer/config/tech_ptm32.yaml
# Supply: 0.9 V, 10 µA bias current.  One-stage: no Miller cap, so GBW/PM/SR are not modelled.
#
# Usage:
#   circuitgenome size circuits/one_stage_opamp/circuit_0001_flat.ckt \
#     --topology one_stage_opamp \
#     --spec examples/one_stage_specs/spec_ptm32.yaml \
#     --tech ptm32

vdd: 0.9            # V — positive supply
vss: 0.0            # V — ground
ibias: 10.0e-6      # A — input bias current
cl: 2.0e-12       # F — output load capacitance

# DC and frequency performance
gain_min_db: 35           # dB — minimum open-loop DC gain

# Power and swing
power_max_w: 5.0e-4      # W  — maximum total quiescent power
output_swing_max_v: 0.75   # V  — 0.15 V headroom from VDD
output_swing_min_v: 0.15    # V  — 0.15 V headroom from VSS
