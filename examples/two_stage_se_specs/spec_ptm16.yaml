# Feasible two-stage single-ended op-amp spec for PTM 16 nm (HP) bulk.
# Technology: ptm16_hp, circuitgenome/sizer/config/tech_ptm16.yaml
#   NOTE: PTM 16 nm bulk is a PREDICTIVE planar extrapolation; real 16 nm
#   silicon is FinFET. Use for exploration only.
# Supply: 0.7 V (nominal node Vdd), 10 µA bias current
#
# Usage:
#   circuitgenome size circuits/two_stage_opamp_single_ended/circuit_0001_flat.ckt \
#     --topology two_stage_opamp_single_ended \
#     --spec examples/two_stage_se_specs/spec_ptm16.yaml \
#     --tech ptm16

vdd: 0.7          # V — positive supply (PTM 16 nm nominal Vdd)
vss: 0.0          # V — ground
ibias: 15.0e-6    # A — input bias current
cl: 2.0e-12       # F — output load capacitance

second_stage_current_ratio: 2.5   # iDS_2 = ratio × ibias = 37.5 µA

# DC and frequency performance
gain_min_db: 52           # dB — minimum open-loop DC gain
gbw_min_hz: 2.5e+6        # Hz — minimum unity-gain bandwidth (2.5 MHz)
phase_margin_min_deg: 60  # °  — minimum phase margin
slew_rate_min_vps: 5.0e+5 # V/s — minimum slew rate (ibias / Cc)

# Power and swing
power_max_w: 5.0e-4       # W  — maximum total quiescent power
output_swing_max_v: 0.55   # V  — 0.15 V headroom from VDD
output_swing_min_v: 0.15   # V  — 0.15 V headroom from VSS
