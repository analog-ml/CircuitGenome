# Performance specification for a three-stage fully-differential (NMC) op-amp.
# Technology: generic_parameterized (0.25µm-like), see circuitgenome/sizer/config/tech_generic.yaml
# Supply: 5 V single supply, 10 µA bias current
#
# Fully-differential three-stage cascade with nested Miller compensation on each
# half (outer Cc1, inner Cc2 = Cc1/4) plus common-mode feedback.  The sizer
# enforces cross-slot symmetry between the p/n second- and third-stage halves.
# The performance target is identical to the single-ended example; only the
# topology differs.
#
# Note: the fully-differential circuits are not pre-shipped under circuits/.
# Generate them first, e.g.:
#   circuitgenome synthesize --topology three_stage_opamp_nmc_fully_differential \
#     --output-dir circuits/
#
# Usage:
#   circuitgenome size circuits/three_stage_opamp_nmc_fully_differential/circuit_0001_flat.ckt \
#     --topology three_stage_opamp_nmc_fully_differential \
#     --spec examples/spec_three_stage_opamp_fully_differential.yaml

vdd: 5.0          # V — positive supply
vss: 0.0          # V — negative supply / ground
ibias: 10.0e-6    # A — input bias current (tail carries ibias, each input device ibias/2)
cl: 20.0e-12      # F — output load capacitance (per output)

second_stage_current_ratio: 2.5   # iDS_2 = ratio × ibias = 25 µA (per half)
third_stage_current_ratio: 5.0    # iDS_3 = ratio × ibias = 50 µA (per half)

# DC and frequency performance
gain_min_db: 100          # dB — minimum open-loop DC gain (three-stage target)
gbw_min_hz: 2.5e+6        # Hz — minimum unity-gain bandwidth (2.5 MHz)
phase_margin_min_deg: 60  # °  — minimum phase margin (split between two non-dominant poles)
slew_rate_min_vps: 3.5e+6 # V/s — minimum slew rate (ibias / Cc1) (3.5 V/µs)

# Power and swing
power_max_w: 1.0e-3       # W  — maximum total quiescent power
output_swing_max_v: 4.6   # V  — maximum output voltage (0.4 V headroom from VDD)
output_swing_min_v: 0.4   # V  — minimum output voltage (0.4 V headroom from VSS)
