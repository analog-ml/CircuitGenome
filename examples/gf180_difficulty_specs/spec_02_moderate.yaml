# GF180MCU difficulty ladder — 2/5: MODERATE
# Technology: gf180mcu (GlobalFoundries 180 nm, 3.3 V core, gm/Id LUT sizer)
# Mid-range targets. Binding constraint: DC gain (rejects low-gain mirror-load stages).
# Reference frontier (two_stage_opamp_single_ended, --limit 60): ~42/60 accepted.
#
# Usage:
#   circuitgenome design --topology two_stage_opamp_single_ended \
#     --spec examples/gf180_difficulty_specs/spec_02_moderate.yaml --tech gf180mcu -o out/

vdd: 3.3
vss: 0.0
ibias: 20.0e-6
cl: 5.0e-12

gain_min_db: 65           # dB — the primary filter at this rung
gbw_min_hz: 2.5e+6        # Hz — 2.5 MHz
phase_margin_min_deg: 60  # °
slew_rate_min_vps: 3.0e+5 # V/s
power_max_w: 1.8e-3       # W
output_swing_max_v: 3.0   # V — 0.3 V headroom
output_swing_min_v: 0.3   # V
