# GF180MCU difficulty ladder — 4/5: VERY HARD
# Technology: gf180mcu (GlobalFoundries 180 nm, 3.3 V core, gm/Id LUT sizer)
# Same 92 dB gain as HARD, but the power cap is tightened to 0.6 mW. This forces the
# gain-vs-power tradeoff: power-hungry cascode stages that pass HARD are now rejected.
# Binding constraints: gain AND power. Only ~1/3 of the HARD-feasible set survives.
# Reference frontier (two_stage_opamp_single_ended, --limit 60): ~9/60 accepted.
#
# Usage:
#   circuitgenome design --topology two_stage_opamp_single_ended \
#     --spec examples/gf180_difficulty_specs/spec_04_very_hard.yaml --tech gf180mcu -o out/

vdd: 3.3
vss: 0.0
ibias: 20.0e-6
cl: 5.0e-12

gain_min_db: 92           # dB — same high-gain target as spec_03
gbw_min_hz: 5.0e+6        # Hz — 5 MHz
phase_margin_min_deg: 66  # °
slew_rate_min_vps: 6.0e+5 # V/s
power_max_w: 0.6e-3       # W — tight: this is the added binding constraint vs spec_03
output_swing_max_v: 2.95  # V — 0.35 V headroom
output_swing_min_v: 0.35  # V
