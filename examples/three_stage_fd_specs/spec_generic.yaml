# Feasible three-stage fully-differential op-amp spec for generic_parameterized.
# Technology: generic, circuitgenome/sizer/config/tech_generic.yaml
# Supply: 5.0 V, 10 µA bias current.  3-stage spec applies to both NMC and RNMC variants.
#
# Usage:
#   circuitgenome size circuits/three_stage_opamp_nmc_fully_differential/circuit_0001_flat.ckt \
#     --topology three_stage_opamp_nmc_fully_differential \
#     --spec examples/three_stage_fd_specs/spec_generic.yaml \
#     --tech generic

vdd: 5.0            # V — positive supply
vss: 0.0            # V — ground
ibias: 10.0e-6      # A — input bias current
cl: 20.0e-12       # F — output load capacitance

second_stage_current_ratio: 2.5   # iDS_2 = ratio × ibias = 25 µA
third_stage_current_ratio: 5.0    # iDS_3 = ratio × ibias = 50 µA

# DC and frequency performance
gain_min_db: 100          # dB — minimum open-loop DC gain
gbw_min_hz: 2.5e+6        # Hz — minimum unity-gain bandwidth (2.5 MHz)
phase_margin_min_deg: 60  # °  — minimum phase margin
slew_rate_min_vps: 3.5e+6  # V/s — minimum slew rate (ibias / Cc)

# Power and swing
power_max_w: 2.0e-3      # W  — maximum total quiescent power
output_swing_max_v: 4.6   # V  — 0.4 V headroom from VDD
output_swing_min_v: 0.4    # V  — 0.4 V headroom from VSS
