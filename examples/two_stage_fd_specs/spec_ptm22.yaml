# Feasible two-stage fully-differential op-amp spec for PTM 22 nm HP bulk.
# Technology: ptm22, circuitgenome/sizer/config/tech_ptm22.yaml
# Supply: 0.8 V, 10 µA bias current.
#
# Usage:
#   circuitgenome size circuits/two_stage_opamp_fully_differential/circuit_0001_flat.ckt \
#     --topology two_stage_opamp_fully_differential \
#     --spec examples/two_stage_fd_specs/spec_ptm22.yaml \
#     --tech ptm22

vdd: 0.8            # V — positive supply
vss: 0.0            # V — ground
ibias: 10.0e-6      # A — input bias current
cl: 2.0e-12       # F — output load capacitance

second_stage_current_ratio: 2.5   # iDS_2 = ratio × ibias = 25 µA

# DC and frequency performance
gain_min_db: 55           # dB — minimum open-loop DC gain
gbw_min_hz: 2.5e+6        # Hz — minimum unity-gain bandwidth (2.5 MHz)
phase_margin_min_deg: 60  # °  — minimum phase margin
slew_rate_min_vps: 5.0e+5  # V/s — minimum slew rate (ibias / Cc)

# Power and swing
power_max_w: 5.0e-4      # W  — maximum total quiescent power
output_swing_max_v: 0.7   # V  — 0.1 V headroom from VDD
output_swing_min_v: 0.1    # V  — 0.1 V headroom from VSS
