  # ══ BUFFERED TOPOLOGIES ════════════════════════════════════════════════
  # Same as the topologies above, but with a source-follower output_stage
  # (gain ~ 1) inserted between the last amplification stage and the final
  # output. The amplification stage now drives an internal node (net_ampout
  # / net_ampout_p/n); the follower buffers that node to the output. Miller
  # compensation is re-pointed to net_ampout so it stays wrapped around the
  # amplification stage, NOT the follower (a Miller cap across a follower
  # bootstraps to ~0). See issues #125/#126.

  # ── 2-STAGE BUFFERED (single-ended output) ─────────────────────────────
  - name: two_stage_opamp_buffered_single_ended
    config:
      output_type: single_ended
      stages: 2
