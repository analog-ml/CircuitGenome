# Op-amp topology templates.
# Each template specifies:
#   external_ports  – the top-level subcircuit ports (in SPICE order)
#   slots           – module categories needed and their slot names
#   connections     – maps each (slot, port) pair to a global net name
#
# Nets named "vdd!" and "gnd!" are power rails; they are wired automatically
# to any slot port named "vdd" or "gnd" by the synthesizer.
#
# Load canonical interface: in1, in2, out, out1, out2, bias1, bias2, bias3,
# bias_cmfb. input_pair.out1/out2 feed load.in1/in2 (net_diff1, and
# net_diff2/net_fold2 — the load's folding nodes). load.out1/out2
# (fully_differential templates: net_loadout1/net_loadout2) and load.out/out2
# (single-ended templates: the stage-output net) are the load's actual output
# node(s), sensed by cmfb.in1/in2, second_stage*.in, and comp*.in. in1/in2 and
# out1/out2/out are deliberately DISTINCT nets here: for the 8 cascode load
# variants these are genuinely separate device terminals (e.g. a folded
# cascode's source vs. drain); for the other 6 (resistor/active/
# current-source) loads, out1/out2 declare alias_of: in1/in2 in
# opamp_modules.yaml, and a net-merge pass (net_aliasing.py) collapses each
# such pair back onto one net after assembly, restoring the shared in/out node
# those variants' devices assume.
# load.bias1/bias2/bias3/bias_cmfb are optional bias inputs used by
# cascode-style loads, wired to four distinct bias rails (net_bias1..4)
# produced by bias_gen's out1/out2/out3/out4.
#
# fully_differential templates additionally include a `cmfb` slot
# (common-mode feedback): cmfb.in1/in2 sense net_loadout1/net_loadout2 (the
# load's cascode-output nodes), cmfb.vref is wired to the external vcm_ref
# port, cmfb.bias reuses net_bias4 (bias_gen.out4), and cmfb.out drives
# load.bias_cmfb via a new net_cmfb_out net (replacing the static net_bias4
# connection used directly elsewhere).
#
# config.compensation_scheme (3-stage templates only) – "nested_miller" (NMC)
# or "reversed_nested_miller" (RNMC). Filterable via synthesize(config=...).

topologies:

  # ── 1-STAGE OTA (single-ended output) ──────────────────────────────────
  - name: one_stage_opamp
    config:
      output_type: single_ended
      stages: 1
    external_ports: [ibias, in1, in2, out, vdd!, gnd!]
    slots:
      - {name: input_pair,   category: input_pair}
      - {name: load,         category: load}
      - {name: tail_current, category: tail_current}
      - {name: bias_gen,     category: bias_generation}
    connections:
      - {slot: input_pair,   port: in1,   net: in1}
      - {slot: input_pair,   port: in2,   net: in2}
      - {slot: input_pair,   port: out1,  net: net_diff1}
      - {slot: input_pair,   port: out2,  net: net_fold2}
      - {slot: input_pair,   port: tail,  net: net_tail}
      - {slot: load,         port: in1,       net: net_diff1}
      - {slot: load,         port: in2,       net: net_fold2}
      - {slot: load,         port: out1,      net: net_diff1}
      - {slot: load,         port: out2,      net: out}
      - {slot: load,         port: out,       net: out}
      - {slot: load,         port: bias1,     net: net_bias1}
      - {slot: load,         port: bias2,     net: net_bias2}
      - {slot: load,         port: bias3,     net: net_bias3}
      - {slot: load,         port: bias_cmfb, net: net_bias4}
      - {slot: tail_current, port: out,   net: net_tail}
      - {slot: tail_current, port: bias,      net: net_bias7}
      - {slot: tail_current, port: bias_casc, net: net_bias8}
      - {slot: bias_gen,     port: ibias, net: ibias}
      - {slot: bias_gen,     port: out1,  net: net_bias1}
      - {slot: bias_gen,     port: out2,  net: net_bias2}
      - {slot: bias_gen,     port: out3,  net: net_bias3}
      - {slot: bias_gen,     port: out4,  net: net_bias4}
      - {slot: bias_gen,     port: out5,  net: net_bias5}
      - {slot: bias_gen,     port: out6,  net: net_bias6}
      - {slot: bias_gen,     port: out7,  net: net_bias7}
      - {slot: bias_gen,     port: out8,  net: net_bias8}

  # ── 2-STAGE OTA (single-ended output) ──────────────────────────────────
  - name: two_stage_opamp_single_ended
    config:
      output_type: single_ended
      stages: 2
    external_ports: [ibias, in1, in2, out, vdd!, gnd!]
    slots:
      - {name: input_pair,   category: input_pair}
      - {name: load,         category: load}
      - {name: tail_current, category: tail_current}
      - {name: bias_gen,     category: bias_generation}
      - {name: compensation, category: compensation}
      - {name: second_stage, category: amplification_stage}
    connections:
      - {slot: input_pair,   port: in1,   net: in1}
      - {slot: input_pair,   port: in2,   net: in2}
      - {slot: input_pair,   port: out1,  net: net_diff1}
      - {slot: input_pair,   port: out2,  net: net_fold2}
      - {slot: input_pair,   port: tail,  net: net_tail}
      - {slot: load,         port: in1,       net: net_diff1}
      - {slot: load,         port: in2,       net: net_fold2}
      - {slot: load,         port: out1,      net: net_diff1}
      - {slot: load,         port: out2,      net: net_mid}
      - {slot: load,         port: out,       net: net_mid}
      - {slot: load,         port: bias1,     net: net_bias1}
      - {slot: load,         port: bias2,     net: net_bias2}
      - {slot: load,         port: bias3,     net: net_bias3}
      - {slot: load,         port: bias_cmfb, net: net_bias4}
      - {slot: tail_current, port: out,   net: net_tail}
      - {slot: tail_current, port: bias,      net: net_bias7}
      - {slot: tail_current, port: bias_casc, net: net_bias8}
      - {slot: bias_gen,     port: ibias, net: ibias}
      - {slot: bias_gen,     port: out1,  net: net_bias1}
      - {slot: bias_gen,     port: out2,  net: net_bias2}
      - {slot: bias_gen,     port: out3,  net: net_bias3}
      - {slot: bias_gen,     port: out4,  net: net_bias4}
      - {slot: bias_gen,     port: out5,  net: net_bias5}
      - {slot: bias_gen,     port: out6,  net: net_bias6}
      - {slot: bias_gen,     port: out7,  net: net_bias7}
      - {slot: bias_gen,     port: out8,  net: net_bias8}
      - {slot: second_stage, port: in,    net: net_mid}
      - {slot: second_stage, port: out,   net: out}
      - {slot: second_stage, port: bias,  net: net_bias5}
      - {slot: compensation, port: in,    net: net_mid}
      - {slot: compensation, port: out,   net: out}

  # ── 2-STAGE OTA (fully differential output) ────────────────────────────
  - name: two_stage_opamp_fully_differential
    config:
      output_type: fully_differential
      stages: 2
    external_ports: [ibias, vcm_ref, in1, in2, outp, outn, vdd!, gnd!]
    slots:
      - {name: input_pair,     category: input_pair}
      - {name: load,           category: load}
      - {name: tail_current,   category: tail_current}
      - {name: bias_gen,       category: bias_generation}
      - {name: cmfb,           category: cmfb}
      - {name: comp_p,         category: compensation}
      - {name: comp_n,         category: compensation}
      - {name: second_stage_p, category: amplification_stage}
      - {name: second_stage_n, category: amplification_stage}
    connections:
      - {slot: input_pair,      port: in1,   net: in1}
      - {slot: input_pair,      port: in2,   net: in2}
      - {slot: input_pair,      port: out1,  net: net_diff1}
      - {slot: input_pair,      port: out2,  net: net_diff2}
      - {slot: input_pair,      port: tail,  net: net_tail}
      - {slot: load,            port: in1,       net: net_diff1}
      - {slot: load,            port: in2,       net: net_diff2}
      - {slot: load,            port: out1,      net: net_loadout1}
      - {slot: load,            port: out2,      net: net_loadout2}
      - {slot: load,            port: bias1,     net: net_bias1}
      - {slot: load,            port: bias2,     net: net_bias2}
      - {slot: load,            port: bias3,     net: net_bias3}
      - {slot: load,            port: bias_cmfb, net: net_cmfb_out}
      - {slot: tail_current,    port: out,   net: net_tail}
      - {slot: tail_current,    port: bias,      net: net_bias7}
      - {slot: tail_current,    port: bias_casc, net: net_bias8}
      - {slot: bias_gen,        port: ibias, net: ibias}
      - {slot: bias_gen,        port: out1,  net: net_bias1}
      - {slot: bias_gen,        port: out2,  net: net_bias2}
      - {slot: bias_gen,        port: out3,  net: net_bias3}
      - {slot: bias_gen,        port: out4,  net: net_bias4}
      - {slot: bias_gen,        port: out5,  net: net_bias5}
      - {slot: bias_gen,        port: out6,  net: net_bias6}
      - {slot: bias_gen,        port: out7,  net: net_bias7}
      - {slot: bias_gen,        port: out8,  net: net_bias8}
      - {slot: cmfb,            port: in1,   net: net_loadout1}
      - {slot: cmfb,            port: in2,   net: net_loadout2}
      - {slot: cmfb,            port: vref,  net: vcm_ref}
      - {slot: cmfb,            port: bias,  net: net_bias4}
      - {slot: cmfb,            port: out,   net: net_cmfb_out}
      # Positive output: second stage driven by diff pair output2
      - {slot: second_stage_p,  port: in,    net: net_loadout2}
      - {slot: second_stage_p,  port: out,   net: outp}
      - {slot: second_stage_p,  port: bias,  net: net_bias5}
      - {slot: comp_p,          port: in,    net: net_loadout2}
      - {slot: comp_p,          port: out,   net: outp}
      # Negative output: second stage driven by diff pair output1
      - {slot: second_stage_n,  port: in,    net: net_loadout1}
      - {slot: second_stage_n,  port: out,   net: outn}
      - {slot: second_stage_n,  port: bias,  net: net_bias5}
      - {slot: comp_n,          port: in,    net: net_loadout1}
      - {slot: comp_n,          port: out,   net: outn}

  # ── 3-STAGE OTA, NESTED MILLER COMPENSATION (single-ended output) ───────
  # Stage1 output (net_mid1) feeds stage2 (gm2); stage2 output (net_mid2)
  # feeds stage3 (gm3), which drives the final output.
  # Cm1 (comp1) wraps the outer loop:  net_mid1 -> out
  # Cm2 (comp2) wraps the inner loop:  net_mid2 -> out
  - name: three_stage_opamp_nmc_single_ended
    config:
      output_type: single_ended
      stages: 3
      compensation_scheme: nested_miller
    external_ports: [ibias, in1, in2, out, vdd!, gnd!]
    slots:
      - {name: input_pair,   category: input_pair}
      - {name: load,         category: load}
      - {name: tail_current, category: tail_current}
      - {name: bias_gen,     category: bias_generation}
      - {name: second_stage, category: amplification_stage}
      - {name: third_stage,  category: amplification_stage}
      - {name: comp1,        category: compensation}
      - {name: comp2,        category: compensation}
    connections:
      - {slot: input_pair,   port: in1,   net: in1}
      - {slot: input_pair,   port: in2,   net: in2}
      - {slot: input_pair,   port: out1,  net: net_diff1}
      - {slot: input_pair,   port: out2,  net: net_fold2}
      - {slot: input_pair,   port: tail,  net: net_tail}
      - {slot: load,         port: in1,       net: net_diff1}
      - {slot: load,         port: in2,       net: net_fold2}
      - {slot: load,         port: out1,      net: net_diff1}
      - {slot: load,         port: out2,      net: net_mid1}
      - {slot: load,         port: out,       net: net_mid1}
      - {slot: load,         port: bias1,     net: net_bias1}
      - {slot: load,         port: bias2,     net: net_bias2}
      - {slot: load,         port: bias3,     net: net_bias3}
      - {slot: load,         port: bias_cmfb, net: net_bias4}
      - {slot: tail_current, port: out,   net: net_tail}
      - {slot: tail_current, port: bias,      net: net_bias7}
      - {slot: tail_current, port: bias_casc, net: net_bias8}
      - {slot: bias_gen,     port: ibias, net: ibias}
      - {slot: bias_gen,     port: out1,  net: net_bias1}
      - {slot: bias_gen,     port: out2,  net: net_bias2}
      - {slot: bias_gen,     port: out3,  net: net_bias3}
      - {slot: bias_gen,     port: out4,  net: net_bias4}
      - {slot: bias_gen,     port: out5,  net: net_bias5}
      - {slot: bias_gen,     port: out6,  net: net_bias6}
      - {slot: bias_gen,     port: out7,  net: net_bias7}
      - {slot: bias_gen,     port: out8,  net: net_bias8}
      - {slot: second_stage, port: in,    net: net_mid1}
      - {slot: second_stage, port: out,   net: net_mid2}
      - {slot: second_stage, port: bias,  net: net_bias5}
      - {slot: third_stage,  port: in,    net: net_mid2}
      - {slot: third_stage,  port: out,   net: out}
      - {slot: third_stage,  port: bias,  net: net_bias6}
      - {slot: comp1,        port: in,    net: net_mid1}
      - {slot: comp1,        port: out,   net: out}
      - {slot: comp2,        port: in,    net: net_mid2}
      - {slot: comp2,        port: out,   net: out}

  # ── 3-STAGE OTA, REVERSED NESTED MILLER COMPENSATION (single-ended) ─────
  # Cm1 (comp1) wraps the inner loop:  net_mid2 -> out
  # Cm2 (comp2) wraps the outer loop, but returns to the stage1 output
  # (net_mid1 -> net_mid2) instead of the final output — the "reversed" nest.
  - name: three_stage_opamp_rnmc_single_ended
    config:
      output_type: single_ended
      stages: 3
      compensation_scheme: reversed_nested_miller
    external_ports: [ibias, in1, in2, out, vdd!, gnd!]
    slots:
      - {name: input_pair,   category: input_pair}
      - {name: load,         category: load}
      - {name: tail_current, category: tail_current}
      - {name: bias_gen,     category: bias_generation}
      - {name: second_stage, category: amplification_stage}
      - {name: third_stage,  category: amplification_stage}
      - {name: comp1,        category: compensation}
      - {name: comp2,        category: compensation}
    connections:
      - {slot: input_pair,   port: in1,   net: in1}
      - {slot: input_pair,   port: in2,   net: in2}
      - {slot: input_pair,   port: out1,  net: net_diff1}
      - {slot: input_pair,   port: out2,  net: net_fold2}
      - {slot: input_pair,   port: tail,  net: net_tail}
      - {slot: load,         port: in1,       net: net_diff1}
      - {slot: load,         port: in2,       net: net_fold2}
      - {slot: load,         port: out1,      net: net_diff1}
      - {slot: load,         port: out2,      net: net_mid1}
      - {slot: load,         port: out,       net: net_mid1}
      - {slot: load,         port: bias1,     net: net_bias1}
      - {slot: load,         port: bias2,     net: net_bias2}
      - {slot: load,         port: bias3,     net: net_bias3}
      - {slot: load,         port: bias_cmfb, net: net_bias4}
      - {slot: tail_current, port: out,   net: net_tail}
      - {slot: tail_current, port: bias,      net: net_bias7}
      - {slot: tail_current, port: bias_casc, net: net_bias8}
      - {slot: bias_gen,     port: ibias, net: ibias}
      - {slot: bias_gen,     port: out1,  net: net_bias1}
      - {slot: bias_gen,     port: out2,  net: net_bias2}
      - {slot: bias_gen,     port: out3,  net: net_bias3}
      - {slot: bias_gen,     port: out4,  net: net_bias4}
      - {slot: bias_gen,     port: out5,  net: net_bias5}
      - {slot: bias_gen,     port: out6,  net: net_bias6}
      - {slot: bias_gen,     port: out7,  net: net_bias7}
      - {slot: bias_gen,     port: out8,  net: net_bias8}
      - {slot: second_stage, port: in,    net: net_mid1}
      - {slot: second_stage, port: out,   net: net_mid2}
      - {slot: second_stage, port: bias,  net: net_bias5}
      - {slot: third_stage,  port: in,    net: net_mid2}
      - {slot: third_stage,  port: out,   net: out}
      - {slot: third_stage,  port: bias,  net: net_bias6}
      - {slot: comp1,        port: in,    net: net_mid2}
      - {slot: comp1,        port: out,   net: out}
      - {slot: comp2,        port: in,    net: net_mid1}
      - {slot: comp2,        port: out,   net: net_mid2}

  # ── 3-STAGE OTA, NESTED MILLER COMPENSATION (fully differential) ────────
  # Each output path (p/n) gets its own gm2/gm3 stages and Cm1/Cm2 caps,
  # mirroring the single-ended NMC topology on both sides.
  - name: three_stage_opamp_nmc_fully_differential
    config:
      output_type: fully_differential
      stages: 3
      compensation_scheme: nested_miller
    external_ports: [ibias, vcm_ref, in1, in2, outp, outn, vdd!, gnd!]
    slots:
      - {name: input_pair,     category: input_pair}
      - {name: load,           category: load}
      - {name: tail_current,   category: tail_current}
      - {name: bias_gen,       category: bias_generation}
      - {name: cmfb,           category: cmfb}
      - {name: second_stage_p, category: amplification_stage}
      - {name: third_stage_p,  category: amplification_stage}
      - {name: comp1_p,        category: compensation}
      - {name: comp2_p,        category: compensation}
      - {name: second_stage_n, category: amplification_stage}
      - {name: third_stage_n,  category: amplification_stage}
      - {name: comp1_n,        category: compensation}
      - {name: comp2_n,        category: compensation}
    connections:
      - {slot: input_pair,      port: in1,   net: in1}
      - {slot: input_pair,      port: in2,   net: in2}
      - {slot: input_pair,      port: out1,  net: net_diff1}
      - {slot: input_pair,      port: out2,  net: net_diff2}
      - {slot: input_pair,      port: tail,  net: net_tail}
      - {slot: load,            port: in1,       net: net_diff1}
      - {slot: load,            port: in2,       net: net_diff2}
      - {slot: load,            port: out1,      net: net_loadout1}
      - {slot: load,            port: out2,      net: net_loadout2}
      - {slot: load,            port: bias1,     net: net_bias1}
      - {slot: load,            port: bias2,     net: net_bias2}
      - {slot: load,            port: bias3,     net: net_bias3}
      - {slot: load,            port: bias_cmfb, net: net_cmfb_out}
      - {slot: tail_current,    port: out,   net: net_tail}
      - {slot: tail_current,    port: bias,      net: net_bias7}
      - {slot: tail_current,    port: bias_casc, net: net_bias8}
      - {slot: bias_gen,        port: ibias, net: ibias}
      - {slot: bias_gen,        port: out1,  net: net_bias1}
      - {slot: bias_gen,        port: out2,  net: net_bias2}
      - {slot: bias_gen,        port: out3,  net: net_bias3}
      - {slot: bias_gen,        port: out4,  net: net_bias4}
      - {slot: bias_gen,        port: out5,  net: net_bias5}
      - {slot: bias_gen,        port: out6,  net: net_bias6}
      - {slot: bias_gen,        port: out7,  net: net_bias7}
      - {slot: bias_gen,        port: out8,  net: net_bias8}
      - {slot: cmfb,            port: in1,   net: net_loadout1}
      - {slot: cmfb,            port: in2,   net: net_loadout2}
      - {slot: cmfb,            port: vref,  net: vcm_ref}
      - {slot: cmfb,            port: bias,  net: net_bias4}
      - {slot: cmfb,            port: out,   net: net_cmfb_out}
      # Positive output path: stage1 output is net_diff2
      - {slot: second_stage_p,  port: in,    net: net_loadout2}
      - {slot: second_stage_p,  port: out,   net: net_mid2_p}
      - {slot: second_stage_p,  port: bias,  net: net_bias5}
      - {slot: third_stage_p,   port: in,    net: net_mid2_p}
      - {slot: third_stage_p,   port: out,   net: outp}
      - {slot: third_stage_p,   port: bias,  net: net_bias6}
      - {slot: comp1_p,         port: in,    net: net_loadout2}
      - {slot: comp1_p,         port: out,   net: outp}
      - {slot: comp2_p,         port: in,    net: net_mid2_p}
      - {slot: comp2_p,         port: out,   net: outp}
      # Negative output path: stage1 output is net_diff1
      - {slot: second_stage_n,  port: in,    net: net_loadout1}
      - {slot: second_stage_n,  port: out,   net: net_mid2_n}
      - {slot: second_stage_n,  port: bias,  net: net_bias5}
      - {slot: third_stage_n,   port: in,    net: net_mid2_n}
      - {slot: third_stage_n,   port: out,   net: outn}
      - {slot: third_stage_n,   port: bias,  net: net_bias6}
      - {slot: comp1_n,         port: in,    net: net_loadout1}
      - {slot: comp1_n,         port: out,   net: outn}
      - {slot: comp2_n,         port: in,    net: net_mid2_n}
      - {slot: comp2_n,         port: out,   net: outn}

  # ── 3-STAGE OTA, REVERSED NESTED MILLER COMPENSATION (fully differential)
  # Each output path (p/n) gets its own gm2/gm3 stages and Cm1/Cm2 caps,
  # mirroring the single-ended RNMC topology on both sides.
  - name: three_stage_opamp_rnmc_fully_differential
    config:
      output_type: fully_differential
      stages: 3
      compensation_scheme: reversed_nested_miller
    external_ports: [ibias, vcm_ref, in1, in2, outp, outn, vdd!, gnd!]
    slots:
      - {name: input_pair,     category: input_pair}
      - {name: load,           category: load}
      - {name: tail_current,   category: tail_current}
      - {name: bias_gen,       category: bias_generation}
      - {name: cmfb,           category: cmfb}
      - {name: second_stage_p, category: amplification_stage}
      - {name: third_stage_p,  category: amplification_stage}
      - {name: comp1_p,        category: compensation}
      - {name: comp2_p,        category: compensation}
      - {name: second_stage_n, category: amplification_stage}
      - {name: third_stage_n,  category: amplification_stage}
      - {name: comp1_n,        category: compensation}
      - {name: comp2_n,        category: compensation}
    connections:
      - {slot: input_pair,      port: in1,   net: in1}
      - {slot: input_pair,      port: in2,   net: in2}
