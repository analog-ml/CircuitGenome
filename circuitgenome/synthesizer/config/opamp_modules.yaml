# Op-amp module variant definitions.
# Each variant implements the canonical port signature for its category.
#
# Canonical port signatures by category:
#   input_pair:       in1, in2, out1, out2, tail, vdd, gnd
#   load:             in1, in2, out, out1, out2, bias1, bias2, bias3,
#                     bias_cmfb, vdd, gnd
#                       - in1, in2  : the two differential signal nodes,
#                                     connected to input_pair.out1 / out2
#                       - out       : single-ended stage output. Mandatory on
#                                     single-output cascode loads
#                                     (folded_cascode_*_single_output,
#                                     telescopic_cascode_*); optional/unused
#                                     on simple and differential-output loads.
#                       - out1, out2: differential output nodes. For simple
#                                     (non-cascode) loads these alias in1/in2
#                                     (out1 == in1, out2 == in2 — declared via
#                                     `alias_of` on the port, since there is
#                                     no folding node). For
#                                     differential-output folded-cascode loads
#                                     these are distinct cascode-output nodes,
#                                     bridged to in1/in2 via cascode
#                                     transistors (source on in1/in2, drain on
#                                     out1/out2). Optional/unused on
#                                     single-output cascode loads.
#                       - bias1..3,
#                         bias_cmfb : optional bias inputs; each variant
#                                     declares only as many as it needs (e.g. a
#                                     single current-source gate bias, or
#                                     separate folding / cascode biases for
#                                     cascode loads). bias_cmfb is the
#                                     common-mode-feedback bias used by
#                                     differential-output folded-cascode loads
#                                     to set the output common-mode current.
#                                     bias1/bias2/bias3/bias_cmfb are wired to
#                                     up to four DISTINCT bias rails
#                                     (net_bias1/2/3/4), produced by bias_gen's
#                                     out1/out2/out3/out4.
#   tail_current:     out, bias, vdd, gnd
#   bias_generation:  ibias, out1..out7 (consumed rails only), vdd, gnd
#                       No variants live in this file -- the bias generator
#                       is constructed per combination from consumer demands
#                       (bias_construction.py + bias_legs.yaml). out1..out4
#                       feed load.bias1/bias2/bias3/bias_cmfb (net_bias1..4);
#                       out5 feeds second_stage*.bias (net_bias5); out6 feeds
#                       third_stage*.bias (net_bias6); out7 feeds
#                       tail_current.bias (net_bias7). Only consumed rails
#                       get a port and a leg.
#   compensation:     in, out
#   second_stage:     in, out, bias, vdd, gnd
#                       (category: amplification_stage -- voltage-gain stages,
#                       filled into the second_stage/third_stage slots)
#   output_stage:     in, out, bias, vdd, gnd
#                       Same canonical signature as the amplification stage, but
#                       a follower buffer (gain ~ 1): in -> gate, out -> source,
#                       bias -> current-source gate. Held separately so gain_db
#                       counts only real gain stages and the follower stays
#                       outside the Miller loop.
#   cmfb:             in1, in2, vref, bias, out, vdd, gnd
#                       - in1, in2  : differential sense inputs. In
#                                     fully_differential topologies, wired to
#                                     net_diff1/net_diff2 (the load's
#                                     first-stage differential outputs).
#                       - vref      : common-mode reference voltage, wired to
#                                     the external vcm_ref port.
#                       - bias      : tail-current bias input, wired to
#                                     net_bias4 (bias_gen.out4).
#                       - out       : drives load.bias_cmfb via net_cmfb_out,
#                                     closing the common-mode feedback loop.
#
# Device terminal keys:
#   MOSFET: d (drain), g (gate), s (source), b (bulk)
#   Resistor: t1, t2
#   Capacitor: p (plus), m (minus)
#
# Cross-category compatibility (`polarity` field):
#   input_pair, load, and tail_current variants whose current-flow direction
#   depends on the input pair's polarity declare `polarity: pmos_input` or
#   `polarity: nmos_input`. enumerate_circuits() skips any combination that
#   mixes the two tags (see circuitgenome.synthesizer.polarity_compatibility), since
#   that leaves a shared node with no DC current path -- e.g. an NMOS input
#   pair (drains out1/out2 into the tail) paired with active_load_nmos (also
#   sinks out1/out2 to gnd), or with current_mirror_tail_pmos (sources
#   current into the tail instead of sinking it). Variants compatible with
#   either polarity (e.g. inverter_based_input) omit the field.

modules:

  # ─── INPUT PAIRS ───────────────────────────────────────────────────────────

  - name: differential_pair_pmos
    category: input_pair
    polarity: pmos_input
    display_name: "PMOS Differential Pair"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: pmos, d: out1, g: in1, s: tail, b: tail}
      - {ref: m2, type: pmos, d: out2, g: in2, s: tail, b: tail}

  - name: differential_pair_nmos
    category: input_pair
    polarity: nmos_input
    display_name: "NMOS Differential Pair"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: nmos, d: out1, g: in1, s: tail, b: tail}
      - {ref: m2, type: nmos, d: out2, g: in2, s: tail, b: tail}

  - name: differential_pair_pmos_degenerated
    category: input_pair
    polarity: pmos_input
    display_name: "PMOS Differential Pair with Source Degeneration"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: pmos, d: out1, g: in1, s: s1,   b: s1}
      - {ref: m2, type: pmos, d: out2, g: in2, s: s2,   b: s2}
      - {ref: r1, type: resistor, t1: s1,  t2: tail}
      - {ref: r2, type: resistor, t1: s2,  t2: tail}

  - name: differential_pair_nmos_degenerated
    category: input_pair
    polarity: nmos_input
    display_name: "NMOS Differential Pair with Source Degeneration"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: nmos, d: out1, g: in1, s: s1,   b: s1}
      - {ref: m2, type: nmos, d: out2, g: in2, s: s2,   b: s2}
      - {ref: r1, type: resistor, t1: s1,  t2: tail}
      - {ref: r2, type: resistor, t1: s2,  t2: tail}

  - name: inverter_based_input
    category: input_pair
    display_name: "Inverter-Based Input Stage"
    # Two back-to-back CMOS inverters used as a differential input --
    # self-biased, no tail-current source needed. tail_current is pruned to
    # an empty placeholder for this variant; see tail_current_compatibility.py.
    # Parked (issue #113): the quiescent current is set by W/L at the pinned
    # gate voltage (Vgs = Vcm - rail), not by spec.ibias, and the gm/Id sizer
    # has no fixed-Vgs sizing path -- it sizes these as tail-limited pairs,
    # yielding mA-scale crowbar currents at mid-rail Vcm (gf180: 90/90 bias
    # failures, 15 mW vs 2 mW budget). Un-park by adding a dedicated
    # fixed-Vgs sizing path (solve W from the LUT at Vgs = Vcm, which also
    # places the inverter trip point at Vcm) and removing this tag.
    unsupported: >-
      issue #113: self-biased (Vgs pinned at Vcm); the gm/Id sizer has no
      fixed-Vgs sizing path, so candidates draw mA-scale crowbar current
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: optional}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: mp1, type: pmos, d: out1, g: in1, s: vdd, b: vdd}
      - {ref: mn1, type: nmos, d: out1, g: in1, s: gnd, b: gnd}
      - {ref: mp2, type: pmos, d: out2, g: in2, s: vdd, b: vdd}
      - {ref: mn2, type: nmos, d: out2, g: in2, s: gnd, b: gnd}

  # ─── LOADS ────────────────────────────────────────────────────────────────

  - name: resistor_load_vdd
    category: load
    polarity: nmos_input
    display_name: "Resistor Load (to VDD)"
    # No folding/cascode: out1/out2 alias in1/in2 (same nodes).
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: r1, type: resistor, t1: vdd, t2: in1}
      - {ref: r2, type: resistor, t1: vdd, t2: in2}
  - name: resistor_load_gnd
    category: load
    polarity: pmos_input
    display_name: "Resistor Load (to GND)"
    # No folding/cascode: out1/out2 alias in1/in2 (same nodes).
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: r1, type: resistor, t1: in1, t2: gnd}
      - {ref: r2, type: resistor, t1: in2, t2: gnd}
  - name: active_load_pmos
    category: load
    polarity: nmos_input
    display_name: "PMOS Active Load (Current Mirror)"
    # in1 = diode-connected reference side; in2 = mirror output side.
    # No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: pmos, d: in1, g: in1, s: vdd, b: vdd}
      - {ref: m2, type: pmos, d: in2, g: in1, s: vdd, b: vdd}

  - name: active_load_nmos
    category: load
    polarity: pmos_input
    display_name: "NMOS Active Load (Current Mirror)"
    # No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: nmos, d: in1, g: in1, s: gnd, b: gnd}
      - {ref: m2, type: nmos, d: in2, g: in1, s: gnd, b: gnd}

  - name: current_source_load_pmos
    category: load
    polarity: nmos_input
    output_cardinality: differential
    display_name: "Current Source Load (PMOS)"
    # Plain PMOS current sources on both branches -- a single shared gate
    # voltage sets both branch currents, so nothing in the load absorbs a
    # load-vs-tail current mismatch. Only viable with common-mode control:
    # the gates are driven by the CMFB loop (bias_cmfb), which is exactly
    # the textbook FD current-source load. Tagged "differential" so the
    # variant never enumerates in single-ended topologies (issue #112; the
    # untapped-branch filter would reject it there anyway).
    # No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: pmos, d: in1, g: bias_cmfb, s: vdd, b: vdd}
      - {ref: m2, type: pmos, d: in2, g: bias_cmfb, s: vdd, b: vdd}
  - name: current_source_load_nmos
    category: load
    polarity: pmos_input
    output_cardinality: differential
    display_name: "Current Source Load (NMOS)"
    # Mirror image of current_source_load_pmos: NMOS current sinks on both
    # branches, gates driven by the CMFB loop (bias_cmfb). Tagged
    # "differential" -- see current_source_load_pmos (issue #112).
    # No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: nmos, d: in1, g: bias_cmfb, s: gnd, b: gnd}
      - {ref: m2, type: nmos, d: in2, g: bias_cmfb, s: gnd, b: gnd}
  - name: folded_cascode_load_nmos_input_single_output
    category: load
    polarity: nmos_input
    output_cardinality: single
    display_name: "Folded-Cascode Load (NMOS Input Pair, Single Output)"
    # in1/in2 = folding nodes (PMOS folding sources mp1/mp2, gated bias1).
    # mp3/mp4 cascode the folding nodes (gated bias2) up to a PMOS mirror
    # reference/output pair (internal_0/out), whose current is set by the
    # NMOS cascode mirror mn1/mn3 (reference leg) and mn2/mn4 (mirrored
    # output leg). out = mp4.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: in1,       g: bias1,      s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: in2,       g: bias1,      s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: internal_0, g: bias2,     s: in1,        b: vdd}
      - {ref: mp4, type: pmos, d: out,       g: bias2,      s: in2,        b: vdd}
      - {ref: mn1, type: nmos, d: internal_0, g: internal_0, s: internal_1, b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: internal_0, s: internal_2, b: gnd}
      - {ref: mn3, type: nmos, d: internal_1, g: internal_1, s: gnd,       b: gnd}
      - {ref: mn4, type: nmos, d: internal_2, g: internal_1, s: gnd,       b: gnd}

  - name: folded_cascode_load_pmos_input_single_output
    category: load
    polarity: pmos_input
    output_cardinality: single
    display_name: "Folded-Cascode Load (PMOS Input Pair, Single Output)"
    # Mirror image of folded_cascode_load_nmos_input_single_output: in1/in2
    # = folding nodes (NMOS folding sinks mn3/mn4, gated bias1). mn1/mn2
    # cascode the folding nodes (gated bias2) down to an NMOS mirror
    # reference/output pair (internal_2/out), whose current is set by the
    # PMOS cascode mirror mp1/mp3 (reference leg) and mp2/mp4 (mirrored
    # output leg). out = mp4.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: internal_2, g: internal_2, s: internal_0, b: vdd}
      - {ref: mp4, type: pmos, d: out,        g: internal_2, s: internal_1, b: vdd}
      - {ref: mn1, type: nmos, d: internal_2, g: bias2,      s: in1,       b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: bias2,      s: in2,       b: gnd}
      - {ref: mn3, type: nmos, d: in1,        g: bias1,      s: gnd,       b: gnd}
      - {ref: mn4, type: nmos, d: in2,        g: bias1,      s: gnd,       b: gnd}

  - name: folded_cascode_load_nmos_input_differential_output
    category: load
    polarity: nmos_input
    output_cardinality: differential
    display_name: "Folded-Cascode Load (NMOS Input Pair, Differential Output)"
    # in1/in2 = folding nodes (PMOS folding sources mp1/mp2, gated bias1).
    # mp3/mp4 cascode the folding nodes (gated bias2) up to the distinct
    # cascode-output nodes out1/out2. mn1/mn2 cascode out1/out2 (gated
    # bias3) down to internal_0/internal_1; mn3/mn4 are the NMOS tail
    # current sinks for the differential branches, gated by bias_cmfb so an
    # external common-mode feedback loop sets the output common-mode level.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output}
      - {name: out2,      role: output}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: input}
      - {name: bias_cmfb, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: in1,       g: bias1,    s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: in2,       g: bias1,    s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: out1,      g: bias2,    s: in1,        b: vdd}
      - {ref: mp4, type: pmos, d: out2,      g: bias2,    s: in2,        b: vdd}
      - {ref: mn1, type: nmos, d: out1,      g: bias3,    s: internal_0, b: gnd}
      - {ref: mn2, type: nmos, d: out2,      g: bias3,    s: internal_1, b: gnd}
      - {ref: mn3, type: nmos, d: internal_0, g: bias_cmfb, s: gnd,      b: gnd}
      - {ref: mn4, type: nmos, d: internal_1, g: bias_cmfb, s: gnd,      b: gnd}

  - name: folded_cascode_load_pmos_input_differential_output
    category: load
    polarity: pmos_input
    output_cardinality: differential
    display_name: "Folded-Cascode Load (PMOS Input Pair, Differential Output)"
    # Mirror image of folded_cascode_load_nmos_input_differential_output:
    # in1/in2 = folding nodes (NMOS folding sinks mn3/mn4, gated bias1).
    # mn1/mn2 cascode the folding nodes (gated bias2) down to the distinct
    # cascode-output nodes out1/out2. mp3/mp4 cascode out1/out2 (gated
    # bias3) up to internal_0/internal_1; mp1/mp2 are the PMOS tail current
    # sources for the differential branches, gated by bias_cmfb so an
    # external common-mode feedback loop sets the output common-mode level.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output}
      - {name: out2,      role: output}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: input}
      - {name: bias_cmfb, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: bias_cmfb, s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: bias_cmfb, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: out1,       g: bias3,    s: internal_0, b: vdd}
      - {ref: mp4, type: pmos, d: out2,       g: bias3,    s: internal_1, b: vdd}
      - {ref: mn1, type: nmos, d: out1,       g: bias2,    s: in1,        b: gnd}
      - {ref: mn2, type: nmos, d: out2,       g: bias2,    s: in2,        b: gnd}
      - {ref: mn3, type: nmos, d: in1,        g: bias1,    s: gnd,        b: gnd}
      - {ref: mn4, type: nmos, d: in2,        g: bias1,    s: gnd,        b: gnd}

  - name: telescopic_cascode_load_pmos
    category: load
    polarity: pmos_input
    output_cardinality: single
    display_name: "Telescopic-Cascode Load (PMOS, for PMOS Input Pair, Single Output)"
    # Self-biased telescopic stack: mp1/mp2 are PMOS cascode devices (gated
    # by bias1) connecting in1/in2 up to internal_0/out; mn1/mn3 form a
    # diode-connected NMOS cascode reference leg (internal_0/internal_1),
    # mirrored by mn2/mn4 onto the output leg.
    # out = mp2.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: bias1,      s: in1,        b: vdd}
      - {ref: mp2, type: pmos, d: out,        g: bias1,      s: in2,        b: vdd}
      - {ref: mn1, type: nmos, d: internal_0, g: internal_0, s: internal_1, b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: internal_0, s: internal_2, b: gnd}
      - {ref: mn3, type: nmos, d: internal_1, g: internal_1, s: gnd,        b: gnd}
      - {ref: mn4, type: nmos, d: internal_2, g: internal_1, s: gnd,        b: gnd}

  - name: telescopic_cascode_load_nmos
    category: load
    polarity: nmos_input
    output_cardinality: single
    display_name: "Telescopic-Cascode Load (NMOS, for NMOS Input Pair, Single Output)"
    # Mirror image of telescopic_cascode_load_pmos: mn1/mn2 are NMOS cascode
    # devices (gated by bias1) connecting in1/in2 up to internal_2/out;
    # mp1/mp3 form a diode-connected PMOS cascode reference leg
    # (internal_0/internal_2), mirrored by mp2/mp4 onto the output leg.
    # out = mp4.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: internal_2, g: internal_2, s: internal_0, b: vdd}
      - {ref: mp4, type: pmos, d: out,        g: internal_2, s: internal_1, b: vdd}
      - {ref: mn1, type: nmos, d: internal_2, g: bias1, s: in1, b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: bias1, s: in2, b: gnd}

  - name: telescopic_cascode_load_wideswing_pmos
    category: load
    polarity: pmos_input
    output_cardinality: single
    display_name: "Wide-Swing Telescopic-Cascode Load (PMOS, for PMOS Input Pair, Single Output)"
    # Wide-swing (Sooch) twin of telescopic_cascode_load_pmos (issue #129):
    # the NMOS mirror keeps a single self-biased cascode-diode reference on
    # internal_0 (mp1 injects the reference current there; mn1/mn2 are the
    # mirror bottom pair, gated by internal_0), but the output/reference
    # cascodes mn3/mn4 are gated from the "bias2" level rail (a cascode_gnd
    # leg built by the demand-driven bias construction) instead of a second
    # stacked diode. The output-leg saturation floor drops from
    # Vgs+Vdsat (~1.0 V) to 2*Vdsat (~0.4 V) -- biasable by construction
    # against a 3.3 V second-stage pin instead of by knife-edge repair.
    # mp1/mp2 are the PMOS input-pair cascodes (gated by bias1), unchanged.
    # out = mp2.d = mn4.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: bias1,      s: in1,        b: vdd}
      - {ref: mp2, type: pmos, d: out,        g: bias1,      s: in2,        b: vdd}
      - {ref: mn1, type: nmos, d: internal_1, g: internal_0, s: gnd,        b: gnd}
      - {ref: mn2, type: nmos, d: internal_2, g: internal_0, s: gnd,        b: gnd}
      - {ref: mn3, type: nmos, d: internal_0, g: bias2,      s: internal_1, b: gnd}
      - {ref: mn4, type: nmos, d: out,        g: bias2,      s: internal_2, b: gnd}

  - name: telescopic_cascode_load_wideswing_nmos
    category: load
    polarity: nmos_input
    output_cardinality: single
    display_name: "Wide-Swing Telescopic-Cascode Load (NMOS, for NMOS Input Pair, Single Output)"
    # Mirror image of telescopic_cascode_load_wideswing_pmos (issue #129):
    # the PMOS mirror keeps a single self-biased cascode-diode reference on
    # internal_0 (mn1 pulls the reference current from there; mp1/mp2 are the
    # mirror top pair, gated by internal_0), and the cascodes mp3/mp4 are
    # gated from the "bias2" level rail (a cascode_vdd leg) instead of a
    # second stacked diode. mn1/mn2 are the NMOS input-pair cascodes (gated
    # by bias1), unchanged. out = mp4.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_1, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_2, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: internal_0, g: bias2,      s: internal_1, b: vdd}
      - {ref: mp4, type: pmos, d: out,        g: bias2,      s: internal_2, b: vdd}
      - {ref: mn1, type: nmos, d: internal_0, g: bias1,      s: in1,        b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: bias1,      s: in2,        b: gnd}

  # ─── TAIL CURRENT SOURCES ──────────────────────────────────────────────────
  # Each implementation comes in a PMOS/VDD-side and an NMOS/GND-side flavor.
  # A PMOS input pair's tail sources current down into the differential pair,
  # so it must pair with a *_pmos/_vdd variant (sources current from vdd into
  # "out"). An NMOS input pair's tail sinks current coming from the
  # differential pair, so it must pair with a *_nmos/_gnd variant (sinks
  # current from "out" to gnd). Mixing polarities leaves the tail node with no
  # current path and a non-functional circuit.

  - name: current_mirror_tail_pmos
    category: tail_current
    polarity: pmos_input
    display_name: "Current Mirror Tail (PMOS, for PMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # PMOS mirror: bias is the self-biased reference gate/drain; out is the
      # mirrored drain, sourcing current from vdd into the tail node.
      - {ref: m1, type: pmos, d: bias, g: bias, s: vdd, b: vdd}
      - {ref: m2, type: pmos, d: out,  g: bias, s: vdd, b: vdd}

  - name: current_mirror_tail_nmos
    category: tail_current
    polarity: nmos_input
    display_name: "Current Mirror Tail (NMOS, for NMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # Mirror image of current_mirror_tail_pmos: NMOS mirror sinking current
      # from the tail node ("out") to gnd.
      - {ref: m1, type: nmos, d: bias, g: bias, s: gnd, b: gnd}
      - {ref: m2, type: nmos, d: out,  g: bias, s: gnd, b: gnd}

  - name: cascode_current_mirror_tail_pmos
    category: tail_current
    polarity: pmos_input
    display_name: "Cascode Current Mirror Tail (PMOS, for PMOS Input Pair)"
    # Wide-swing PMOS cascode mirror (issue #111): mp1 is the mirror diode
    # (reference on "bias"), mp2 mirrors it, and the output cascode mp3 is
    # gated from the "bias_casc" level rail (a cascode_vdd leg built by the
    # demand-driven bias construction) instead of a stacked diode -- output
    # compliance is Vdsat(mp2)+Vdsat(mp3) from vdd, not |Vgs|+Vdsat.
    ports:
      - {name: out,       role: output}
      - {name: bias,      role: input}
      - {name: bias_casc, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: bias,       g: bias,       s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: bias,       s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: out,        g: bias_casc,  s: internal_1, b: vdd}

  - name: cascode_current_mirror_tail_nmos
    category: tail_current
    polarity: nmos_input
    display_name: "Cascode Current Mirror Tail (NMOS, for NMOS Input Pair)"
    # Mirror image of cascode_current_mirror_tail_pmos: mn1 is the mirror
    # diode (reference on "bias"), mn2 mirrors it, and the output cascode
    # mn3 is gated from the "bias_casc" level rail (a cascode_gnd leg),
    # sinking the tail node ("out") to gnd.
    ports:
      - {name: out,       role: output}
      - {name: bias,      role: input}
      - {name: bias_casc, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mn1, type: nmos, d: bias,       g: bias,       s: gnd,        b: gnd}
      - {ref: mn2, type: nmos, d: internal_1, g: bias,       s: gnd,        b: gnd}
      - {ref: mn3, type: nmos, d: out,        g: bias_casc,  s: internal_1, b: gnd}

  - name: resistor_tail_vdd
    category: tail_current
    polarity: pmos_input
    display_name: "Resistor Tail Current (from VDD, for PMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: optional}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: r1, type: resistor, t1: vdd, t2: out}

  - name: resistor_tail_gnd
    category: tail_current
    polarity: nmos_input
    display_name: "Resistor Tail Current (to GND, for NMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: optional}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: r1, type: resistor, t1: out, t2: gnd}

  # ─── BIAS GENERATION ──────────────────────────────────────────────────────
  # No enumerated variants: the bias generator is *constructed* per
  # combination from what the other slots consume on each bias rail
  # (bias_construction.py), assembling typed leg templates from
  # bias_legs.yaml. The topology's bias_generation slot and its static
  # net_bias1..7 wiring are unchanged.

  # ─── COMPENSATION ─────────────────────────────────────────────────────────

  - name: miller_cap
    category: compensation
    display_name: "Miller Capacitor"
    ports:
      - {name: in,  role: input}
      - {name: out, role: output}
    devices:
      - {ref: c1, type: capacitor, p: in, m: out}

  - name: miller_cap_with_nulling_resistor
    category: compensation
    display_name: "Miller Cap with Nulling Resistor"
    ports:
      - {name: in,  role: input}
      - {name: out, role: output}
    devices:
      - {ref: r1, type: resistor,  t1: in,  t2: cn}
      - {ref: c1, type: capacitor, p: cn,   m: out}

  - name: indirect_compensation
    category: compensation
    display_name: "Indirect Compensation"
    # Compensation via a cascode node (no direct feedforward path).
    ports:
      - {name: in,  role: input}
      - {name: out, role: output}
    devices:
      - {ref: c1, type: capacitor, p: in,  m: ind}
      - {ref: r1, type: resistor,  t1: ind, t2: out}

  # ─── AMPLIFICATION STAGE ──────────────────────────────────────────────────
  # Voltage-gain stages (A > 1). Filled into the second_stage / third_stage
  # topology slots. Followers (gain ~ 1) live in the output_stage category below.

  - name: common_source_nmos
    category: amplification_stage
    display_name: "Common-Source Amplification Stage"
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # NMOS CS amplifier with PMOS current source load
      - {ref: mn1, type: nmos, d: out,  g: in,   s: gnd, b: gnd}
      - {ref: mp1, type: pmos, d: out,  g: bias,  s: vdd, b: vdd}

  - name: common_source_pmos
    category: amplification_stage
    display_name: "Common-Source (PMOS) Amplification Stage"
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # PMOS CS amplifier with NMOS current sink load -- the complement of
      # common_source_nmos, for NMOS input pairs (issue #109): its gate sits a
      # Vgs below vdd, inside an NMOS first stage's output window.
      - {ref: mp1, type: pmos, d: out,  g: in,   s: vdd, b: vdd}
      - {ref: mn1, type: nmos, d: out,  g: bias,  s: gnd, b: gnd}

  - name: differential_ota_second_stage
    category: amplification_stage
    display_name: "Differential OTA Second Stage"
    # Despite the name/comment history ("a simple folded-cascode OTA"), this
    # is two cascaded common-source stages (in -> mn1 -> d1 -> mn2 -> out).
    unsupported: >-
      issue #114: two cascaded common-source stages, not an OTA -- the
      composite is non-inverting, so every Miller-family compensation
      variant around it is positive feedback (RHP response, PM > 180 deg),
      and the internal d1 node is a second gain stage/pole the sizer's
      single-gm2 stage model cannot see
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: mp1, type: pmos, d: d1,  g: bias, s: vdd, b: vdd}
      - {ref: mp2, type: pmos, d: out, g: bias, s: vdd, b: vdd}
      - {ref: mn1, type: nmos, d: d1,  g: in,   s: gnd, b: gnd}
      - {ref: mn2, type: nmos, d: out, g: d1,   s: gnd, b: gnd}

  # ─── OUTPUT STAGE ─────────────────────────────────────────────────────────
  # Source-follower buffers (gain ~ 1). Placed AFTER an amplification stage in
  # the *_buffered_* topologies to drive the load without adding gain; held in
  # their own category so the sizer's gain product counts only real gain stages
  # and the Miller compensation stays wrapped around the amplification stage,
  # not the follower (see issues #125/#126 for the parked history).

  - name: common_drain_pmos
    category: output_stage
    display_name: "Common-Drain (PMOS Source Follower) Output Stage"
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # PMOS source follower biased by a PMOS current source: out = in +
      # |Vgs|, level-shifting the amplification-stage output up. The
      # follower's drain sits on the LOW rail (issue #110: d=vdd operated
      # the device source/drain-inverted, as an uncontrolled pull-up) and
      # its bulk ties to the source (n-well device) so the realized |Vgs|
      # carries no body effect.
      - {ref: mp1, type: pmos, d: gnd, g: in,   s: out,  b: out}
      - {ref: mp2, type: pmos, d: out, g: bias,  s: vdd,  b: vdd}

  - name: common_drain_nmos
    category: output_stage
    display_name: "Common-Drain (NMOS Source Follower) Output Stage"
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # NMOS source follower biased by an NMOS current sink: out = in -
      # Vgs, level-shifting the amplification-stage output down --
      # issue #110's complement of common_drain_pmos. Bulk at gnd (p-substrate
      # device), so the realized Vgs carries body effect.
      - {ref: mn1, type: nmos, d: vdd, g: in,   s: out,  b: gnd}
      - {ref: mn2, type: nmos, d: out, g: bias,  s: gnd,  b: gnd}

  # ─── CMFB (COMMON-MODE FEEDBACK) ──────────────────────────────────────────

  - name: resistive_sense_cmfb
    category: cmfb
    display_name: "Resistive-Sense CMFB (5T OTA)"
    # Two equal resistors average in1/in2 into a sense node; a 5T
    # differential amplifier compares the sense node to vref and drives out.
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: vref, role: input}
      - {name: bias, role: input}
      - {name: out,  role: output}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: r1, type: resistor, t1: in1, t2: sense}
      - {ref: r2, type: resistor, t1: in2, t2: sense}
      - {ref: m1, type: nmos, d: d1,   g: sense, s: tail, b: gnd}
      - {ref: m2, type: nmos, d: out,  g: vref,  s: tail, b: gnd}
      - {ref: m3, type: pmos, d: d1,   g: d1,    s: vdd,  b: vdd}
      - {ref: m4, type: pmos, d: out,  g: d1,    s: vdd,  b: vdd}
      - {ref: m5, type: nmos, d: tail, g: bias,  s: gnd,  b: gnd}

  - name: dda_cmfb
    category: cmfb
    display_name: "Differential-Difference Amplifier CMFB"
    # Two source-coupled pairs, (in1, vref) and (in2, vref), cross-coupled
    # into a shared PMOS mirror so out responds to (in1 + in2) - 2*vref.
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: vref, role: input}
      - {name: bias, role: input}
      - {name: out,  role: output}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: nmos, d: da,    g: in1,  s: tail1, b: gnd}
      - {ref: m2, type: nmos, d: out,   g: vref, s: tail1, b: gnd}
      - {ref: m3, type: nmos, d: da,    g: in2,  s: tail2, b: gnd}
      - {ref: m4, type: nmos, d: out,   g: vref, s: tail2, b: gnd}
      - {ref: m5, type: pmos, d: da,    g: da,   s: vdd,   b: vdd}
      - {ref: m6, type: pmos, d: out,   g: da,   s: vdd,   b: vdd}
      - {ref: m7, type: nmos, d: tail1, g: bias, s: gnd,   b: gnd}
      - {ref: m8, type: nmos, d: tail2, g: bias, s: gnd,   b: gnd}
