# Op-amp module variant definitions.
# Each variant implements the canonical port signature for its category.
#
# Canonical port signatures by category:
#   input_pair:       in1, in2, out1, out2, tail, vdd, gnd
#   load:             in1, in2, out, out1, out2, bias1, bias2, bias3,
#                     bias_cmfb, vdd, gnd
#                       - in1, in2  : the two differential signal nodes,
#                                     connected to input_pair.out1 / out2
#                       - out       : single-ended stage output. Mandatory on
#                                     single-output cascode loads
#                                     (folded_cascode_*_single_output,
#                                     telescopic_cascode_*); optional/unused
#                                     on simple and differential-output loads.
#                       - out1, out2: differential output nodes. For simple
#                                     (non-cascode) loads these alias in1/in2
#                                     (out1 == in1, out2 == in2 — declared via
#                                     `alias_of` on the port, since there is
#                                     no folding node). For
#                                     differential-output folded-cascode loads
#                                     these are distinct cascode-output nodes,
#                                     bridged to in1/in2 via cascode
#                                     transistors (source on in1/in2, drain on
#                                     out1/out2). Optional/unused on
#                                     single-output cascode loads.
#                       - bias1..3,
#                         bias_cmfb : optional bias inputs; each variant
#                                     declares only as many as it needs (e.g. a
#                                     single current-source gate bias, or
#                                     separate folding / cascode biases for
#                                     cascode loads). bias_cmfb is the
#                                     common-mode-feedback bias used by
#                                     differential-output folded-cascode loads
#                                     to set the output common-mode current.
#                                     bias1/bias2/bias3/bias_cmfb are wired to
#                                     up to four DISTINCT bias rails
#                                     (net_bias1/2/3/4), produced by bias_gen's
#                                     out1/out2/out3/out4.
#   tail_current:     out, bias, vdd, gnd
#   bias_generation:  ibias, out1, out2, out3, out4, [vdd], gnd
#                       - out1..out4 : four bias rails so cascode loads can
#                                     receive distinct bias1/bias2/bias3/
#                                     bias_cmfb voltages. Either four
#                                     independent legs each mirroring ibias
#                                     (magic_battery_bias), or four taps along
#                                     a single ibias-to-gnd ladder, each one
#                                     diode-drop/IR-drop below the last
#                                     (diode_connected_mosfet_bias,
#                                     resistor_bias).
#                       - vdd        : optional; only declared by variants
#                                     that source current from vdd
#                                     (magic_battery_bias). Ladder variants
#                                     run entirely from ibias to gnd and omit
#                                     vdd.
#   compensation:     in, out
#   second_stage:     in, out, bias, vdd, gnd
#
# Device terminal keys:
#   MOSFET: d (drain), g (gate), s (source), b (bulk)
#   Resistor: t1, t2
#   Capacitor: p (plus), m (minus)
#
# Cross-category compatibility (`polarity` field):
#   input_pair, load, and tail_current variants whose current-flow direction
#   depends on the input pair's polarity declare `polarity: pmos_input` or
#   `polarity: nmos_input`. enumerate_circuits() skips any combination that
#   mixes the two tags (see circuitgenome.synthesizer.compatibility), since
#   that leaves a shared node with no DC current path -- e.g. an NMOS input
#   pair (drains out1/out2 into the tail) paired with active_load_nmos (also
#   sinks out1/out2 to gnd), or with current_mirror_tail_pmos (sources
#   current into the tail instead of sinking it). Variants compatible with
#   either polarity (inverter_based_input, and -- for now -- all
#   bias_generation variants) omit the field.

modules:

  # ─── INPUT PAIRS ───────────────────────────────────────────────────────────

  - name: differential_pair_pmos
    category: input_pair
    polarity: pmos_input
    display_name: "PMOS Differential Pair"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: pmos, d: out1, g: in1, s: tail, b: tail}
      - {ref: m2, type: pmos, d: out2, g: in2, s: tail, b: tail}

  - name: differential_pair_nmos
    category: input_pair
    polarity: nmos_input
    display_name: "NMOS Differential Pair"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: nmos, d: out1, g: in1, s: tail, b: tail}
      - {ref: m2, type: nmos, d: out2, g: in2, s: tail, b: tail}

  - name: differential_pair_pmos_degenerated
    category: input_pair
    polarity: pmos_input
    display_name: "PMOS Differential Pair with Source Degeneration"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: pmos, d: out1, g: in1, s: s1,   b: s1}
      - {ref: m2, type: pmos, d: out2, g: in2, s: s2,   b: s2}
      - {ref: r1, type: resistor, t1: s1,  t2: tail}
      - {ref: r2, type: resistor, t1: s2,  t2: tail}

  - name: differential_pair_nmos_degenerated
    category: input_pair
    polarity: nmos_input
    display_name: "NMOS Differential Pair with Source Degeneration"
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: supply_in}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: m1, type: nmos, d: out1, g: in1, s: s1,   b: s1}
      - {ref: m2, type: nmos, d: out2, g: in2, s: s2,   b: s2}
      - {ref: r1, type: resistor, t1: s1,  t2: tail}
      - {ref: r2, type: resistor, t1: s2,  t2: tail}

  - name: inverter_based_input
    category: input_pair
    display_name: "Inverter-Based Input Stage"
    # Two back-to-back CMOS inverters used as a differential input.
    # tail port is unused (tied to vdd internally via b of pmos).
    ports:
      - {name: in1,  role: input}
      - {name: in2,  role: input}
      - {name: out1, role: output}
      - {name: out2, role: output}
      - {name: tail, role: optional}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: mp1, type: pmos, d: out1, g: in1, s: vdd, b: vdd}
      - {ref: mn1, type: nmos, d: out1, g: in1, s: gnd, b: gnd}
      - {ref: mp2, type: pmos, d: out2, g: in2, s: vdd, b: vdd}
      - {ref: mn2, type: nmos, d: out2, g: in2, s: gnd, b: gnd}

  # ─── LOADS ────────────────────────────────────────────────────────────────

  - name: resistor_load_vdd
    category: load
    polarity: nmos_input
    display_name: "Resistor Load (to VDD)"
    # No folding/cascode: out1/out2 alias in1/in2 (same nodes).
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: r1, type: resistor, t1: vdd, t2: in1}
      - {ref: r2, type: resistor, t1: vdd, t2: in2}
  - name: resistor_load_gnd
    category: load
    polarity: pmos_input
    display_name: "Resistor Load (to GND)"
    # No folding/cascode: out1/out2 alias in1/in2 (same nodes).
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: r1, type: resistor, t1: in1, t2: gnd}
      - {ref: r2, type: resistor, t1: in2, t2: gnd}
  - name: active_load_pmos
    category: load
    polarity: nmos_input
    display_name: "PMOS Active Load (Current Mirror)"
    # in1 = diode-connected reference side; in2 = mirror output side.
    # No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: pmos, d: in1, g: in1, s: vdd, b: vdd}
      - {ref: m2, type: pmos, d: in2, g: in1, s: vdd, b: vdd}

  - name: active_load_nmos
    category: load
    polarity: pmos_input
    display_name: "NMOS Active Load (Current Mirror)"
    # No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: optional}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: nmos, d: in1, g: in1, s: gnd, b: gnd}
      - {ref: m2, type: nmos, d: in2, g: in1, s: gnd, b: gnd}

  - name: current_source_load_pmos
    category: load
    polarity: nmos_input
    display_name: "Current Source Load (PMOS)"
    # PMOS current sources only — single bias voltage (bias1) sets both
    # branch currents. No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: input}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: pmos, d: in1, g: bias1, s: vdd, b: vdd}
      - {ref: m2, type: pmos, d: in2, g: bias1, s: vdd, b: vdd}
  - name: current_source_load_nmos
    category: load
    polarity: pmos_input
    display_name: "Current Source Load (NMOS)"
    # NMOS current sources only — single bias voltage (bias1) sets both
    # branch currents. No folding/cascode: out1/out2 alias in1/in2.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output, alias_of: in1}
      - {name: out2,      role: output, alias_of: in2}
      - {name: bias1,     role: input}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: m1, type: nmos, d: in1, g: bias1, s: gnd, b: gnd}
      - {ref: m2, type: nmos, d: in2, g: bias1, s: gnd, b: gnd}
  - name: folded_cascode_load_nmos_input_single_output
    category: load
    polarity: nmos_input
    display_name: "Folded-Cascode Load (NMOS Input Pair, Single Output)"
    # in1/in2 = folding nodes (PMOS folding sources mp1/mp2, gated bias1).
    # mp3/mp4 cascode the folding nodes (gated bias2) up to a PMOS mirror
    # reference/output pair (internal_0/out), whose current is set by the
    # NMOS cascode mirror mn1/mn3 (reference leg) and mn2/mn4 (mirrored
    # output leg). out = mp4.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: in1,       g: bias1,      s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: in2,       g: bias1,      s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: internal_0, g: bias2,     s: in1,        b: vdd}
      - {ref: mp4, type: pmos, d: out,       g: bias2,      s: in2,        b: vdd}
      - {ref: mn1, type: nmos, d: internal_0, g: internal_0, s: internal_1, b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: internal_0, s: internal_2, b: gnd}
      - {ref: mn3, type: nmos, d: internal_1, g: internal_1, s: gnd,       b: gnd}
      - {ref: mn4, type: nmos, d: internal_2, g: internal_1, s: gnd,       b: gnd}

  - name: folded_cascode_load_pmos_input_single_output
    category: load
    polarity: pmos_input
    display_name: "Folded-Cascode Load (PMOS Input Pair, Single Output)"
    # Mirror image of folded_cascode_load_nmos_input_single_output: in1/in2
    # = folding nodes (NMOS folding sinks mn3/mn4, gated bias1). mn1/mn2
    # cascode the folding nodes (gated bias2) down to an NMOS mirror
    # reference/output pair (internal_2/out), whose current is set by the
    # PMOS cascode mirror mp1/mp3 (reference leg) and mp2/mp4 (mirrored
    # output leg). out = mp4.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: internal_2, g: internal_2, s: internal_0, b: vdd}
      - {ref: mp4, type: pmos, d: out,        g: internal_2, s: internal_1, b: vdd}
      - {ref: mn1, type: nmos, d: internal_2, g: bias2,      s: in1,       b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: bias2,      s: in2,       b: gnd}
      - {ref: mn3, type: nmos, d: in1,        g: bias1,      s: gnd,       b: gnd}
      - {ref: mn4, type: nmos, d: in2,        g: bias1,      s: gnd,       b: gnd}

  - name: folded_cascode_load_nmos_input_differential_output
    category: load
    polarity: nmos_input
    display_name: "Folded-Cascode Load (NMOS Input Pair, Differential Output)"
    # in1/in2 = folding nodes (PMOS folding sources mp1/mp2, gated bias1).
    # mp3/mp4 cascode the folding nodes (gated bias2) up to the distinct
    # cascode-output nodes out1/out2. mn1/mn2 cascode out1/out2 (gated
    # bias3) down to internal_0/internal_1; mn3/mn4 are the NMOS tail
    # current sinks for the differential branches, gated by bias_cmfb so an
    # external common-mode feedback loop sets the output common-mode level.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output}
      - {name: out2,      role: output}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: input}
      - {name: bias_cmfb, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: in1,       g: bias1,    s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: in2,       g: bias1,    s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: out1,      g: bias2,    s: in1,        b: vdd}
      - {ref: mp4, type: pmos, d: out2,      g: bias2,    s: in2,        b: vdd}
      - {ref: mn1, type: nmos, d: out1,      g: bias3,    s: internal_0, b: gnd}
      - {ref: mn2, type: nmos, d: out2,      g: bias3,    s: internal_1, b: gnd}
      - {ref: mn3, type: nmos, d: internal_0, g: bias_cmfb, s: gnd,      b: gnd}
      - {ref: mn4, type: nmos, d: internal_1, g: bias_cmfb, s: gnd,      b: gnd}

  - name: folded_cascode_load_pmos_input_differential_output
    category: load
    polarity: pmos_input
    display_name: "Folded-Cascode Load (PMOS Input Pair, Differential Output)"
    # Mirror image of folded_cascode_load_nmos_input_differential_output:
    # in1/in2 = folding nodes (NMOS folding sinks mn3/mn4, gated bias1).
    # mn1/mn2 cascode the folding nodes (gated bias2) down to the distinct
    # cascode-output nodes out1/out2. mp3/mp4 cascode out1/out2 (gated
    # bias3) up to internal_0/internal_1; mp1/mp2 are the PMOS tail current
    # sources for the differential branches, gated by bias_cmfb so an
    # external common-mode feedback loop sets the output common-mode level.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: optional}
      - {name: out1,      role: output}
      - {name: out2,      role: output}
      - {name: bias1,     role: input}
      - {name: bias2,     role: input}
      - {name: bias3,     role: input}
      - {name: bias_cmfb, role: input}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: bias_cmfb, s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: bias_cmfb, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: out1,       g: bias3,    s: internal_0, b: vdd}
      - {ref: mp4, type: pmos, d: out2,       g: bias3,    s: internal_1, b: vdd}
      - {ref: mn1, type: nmos, d: out1,       g: bias2,    s: in1,        b: gnd}
      - {ref: mn2, type: nmos, d: out2,       g: bias2,    s: in2,        b: gnd}
      - {ref: mn3, type: nmos, d: in1,        g: bias1,    s: gnd,        b: gnd}
      - {ref: mn4, type: nmos, d: in2,        g: bias1,    s: gnd,        b: gnd}

  - name: telescopic_cascode_load_pmos
    category: load
    polarity: pmos_input
    display_name: "Telescopic-Cascode Load (PMOS, for PMOS Input Pair, Single Output)"
    # Self-biased telescopic stack: mp1/mp2 are PMOS cascode devices (gated
    # by bias1) connecting in1/in2 up to internal_0/out; mn1/mn3 form a
    # diode-connected NMOS cascode reference leg (internal_0/internal_1),
    # mirrored by mn2/mn4 onto the output leg.
    # out = mp2.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: bias1,      s: in1,        b: vdd}
      - {ref: mp2, type: pmos, d: out,        g: bias1,      s: in2,        b: vdd}
      - {ref: mn1, type: nmos, d: internal_0, g: internal_0, s: internal_1, b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: internal_0, s: internal_2, b: gnd}
      - {ref: mn3, type: nmos, d: internal_1, g: internal_1, s: gnd,        b: gnd}
      - {ref: mn4, type: nmos, d: internal_2, g: internal_1, s: gnd,        b: gnd}

  - name: telescopic_cascode_load_nmos
    category: load
    polarity: nmos_input
    display_name: "Telescopic-Cascode Load (NMOS, for NMOS Input Pair, Single Output)"
    # Mirror image of telescopic_cascode_load_pmos: mn1/mn2 are NMOS cascode
    # devices (gated by bias1) connecting in1/in2 up to internal_2/out;
    # mp1/mp3 form a diode-connected PMOS cascode reference leg
    # (internal_0/internal_2), mirrored by mp2/mp4 onto the output leg.
    # out = mp4.d = mn2.d is the single-ended output.
    ports:
      - {name: in1,       role: input}
      - {name: in2,       role: input}
      - {name: out,       role: output}
      - {name: out1,      role: optional}
      - {name: out2,      role: optional}
      - {name: bias1,     role: input}
      - {name: bias2,     role: optional}
      - {name: bias3,     role: optional}
      - {name: bias_cmfb, role: optional}
      - {name: vdd,       role: supply}
      - {name: gnd,       role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: internal_2, g: internal_2, s: internal_0, b: vdd}
      - {ref: mp4, type: pmos, d: out,        g: internal_2, s: internal_1, b: vdd}
      - {ref: mn1, type: nmos, d: internal_2, g: bias1, s: in1, b: gnd}
      - {ref: mn2, type: nmos, d: out,        g: bias1, s: in2, b: gnd}

  # ─── TAIL CURRENT SOURCES ──────────────────────────────────────────────────
  # Each implementation comes in a PMOS/VDD-side and an NMOS/GND-side flavor.
  # A PMOS input pair's tail sources current down into the differential pair,
  # so it must pair with a *_pmos/_vdd variant (sources current from vdd into
  # "out"). An NMOS input pair's tail sinks current coming from the
  # differential pair, so it must pair with a *_nmos/_gnd variant (sinks
  # current from "out" to gnd). Mixing polarities leaves the tail node with no
  # current path and a non-functional circuit.

  - name: current_mirror_tail_pmos
    category: tail_current
    polarity: pmos_input
    display_name: "Current Mirror Tail (PMOS, for PMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # PMOS mirror: bias is the self-biased reference gate/drain; out is the
      # mirrored drain, sourcing current from vdd into the tail node.
      - {ref: m1, type: pmos, d: bias, g: bias, s: vdd, b: vdd}
      - {ref: m2, type: pmos, d: out,  g: bias, s: vdd, b: vdd}

  - name: current_mirror_tail_nmos
    category: tail_current
    polarity: nmos_input
    display_name: "Current Mirror Tail (NMOS, for NMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # Mirror image of current_mirror_tail_pmos: NMOS mirror sinking current
      # from the tail node ("out") to gnd.
      - {ref: m1, type: nmos, d: bias, g: bias, s: gnd, b: gnd}
      - {ref: m2, type: nmos, d: out,  g: bias, s: gnd, b: gnd}

  - name: cascode_current_mirror_tail_pmos
    category: tail_current
    polarity: pmos_input
    display_name: "Cascode Current Mirror Tail (PMOS, for PMOS Input Pair)"
    # Self-biased 2-stack PMOS cascode mirror: mp1/mp3 (reference leg, both
    # diode-connected) generate the cascode-gate bias (internal_0) and the
    # mirror-gate bias (bias); mp2/mp4 (output leg) mirror them onto "out",
    # sourcing current from vdd into the tail node.
    ports:
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: mp1, type: pmos, d: internal_0, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp3, type: pmos, d: bias,       g: bias,       s: internal_0, b: vdd}
      - {ref: mp2, type: pmos, d: internal_1, g: internal_0, s: vdd,        b: vdd}
      - {ref: mp4, type: pmos, d: out,        g: bias,       s: internal_1, b: vdd}

  - name: cascode_current_mirror_tail_nmos
    category: tail_current
    polarity: nmos_input
    display_name: "Cascode Current Mirror Tail (NMOS, for NMOS Input Pair)"
    # Mirror image of cascode_current_mirror_tail_pmos: mn1/mn3 (reference
    # leg, diode-connected) generate the cascode-gate bias (internal_0) and
    # the mirror-gate bias (bias); mn2/mn4 (output leg) mirror them, sinking
    # the tail node ("out") to gnd.
    ports:
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: mn1, type: nmos, d: internal_0, g: internal_0, s: gnd,        b: gnd}
      - {ref: mn3, type: nmos, d: bias,       g: bias,       s: internal_0, b: gnd}
      - {ref: mn2, type: nmos, d: internal_1, g: internal_0, s: gnd,        b: gnd}
      - {ref: mn4, type: nmos, d: out,        g: bias,       s: internal_1, b: gnd}

  - name: resistor_tail_vdd
    category: tail_current
    polarity: pmos_input
    display_name: "Resistor Tail Current (from VDD, for PMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: optional}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: r1, type: resistor, t1: vdd, t2: out}

  - name: resistor_tail_gnd
    category: tail_current
    polarity: nmos_input
    display_name: "Resistor Tail Current (to GND, for NMOS Input Pair)"
    ports:
      - {name: out,  role: output}
      - {name: bias, role: optional}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: r1, type: resistor, t1: out, t2: gnd}

  # ─── BIAS GENERATION ──────────────────────────────────────────────────────

  - name: diode_connected_mosfet_bias
    category: bias_generation
    display_name: "Diode-Connected MOSFET Bias (NMOS Reference, PMOS Legs)"
    # Shared diode-connected NMOS mn1 mirrors ibias to gnd, setting a
    # reference gate voltage. Each leg i has its own complete current path:
    # mn(i+1) mirrors ibias (sinking current to gnd) while diode-connected
    # PMOS mp(i) sits between out_i and vdd, so out_i settles near vdd minus
    # one |V_GSP| -- four independent, ibias-derived bias voltages suitable
    # for biasing PMOS gates.
    ports:
      - {name: ibias, role: input}
      - {name: out1,  role: output}
      - {name: out2,  role: output}
      - {name: out3,  role: output}
      - {name: out4,  role: output}
      - {name: vdd,   role: supply}
      - {name: gnd,   role: supply}
    devices:
      - {ref: mn1, type: nmos, d: ibias, g: ibias, s: gnd,  b: gnd}
      - {ref: mn2, type: nmos, d: out1,  g: ibias, s: gnd,  b: gnd}
      - {ref: mp1, type: pmos, d: out1,  g: out1,  s: vdd,  b: vdd}
      - {ref: mn3, type: nmos, d: out2,  g: ibias, s: gnd,  b: gnd}
      - {ref: mp2, type: pmos, d: out2,  g: out2,  s: vdd,  b: vdd}
      - {ref: mn4, type: nmos, d: out3,  g: ibias, s: gnd,  b: gnd}
      - {ref: mp3, type: pmos, d: out3,  g: out3,  s: vdd,  b: vdd}
      - {ref: mn5, type: nmos, d: out4,  g: ibias, s: gnd,  b: gnd}
      - {ref: mp4, type: pmos, d: out4,  g: out4,  s: vdd,  b: vdd}

  - name: magic_battery_bias
    category: bias_generation
    display_name: "Magic Battery Current Mirror Bias"
    # PMOS diode mp1 sets the ibias reference; four independent mirror
    # legs (mpN/mnN) each generate their own bias rail.
    ports:
      - {name: ibias, role: input}
      - {name: out1,  role: output}
      - {name: out2,  role: output}
      - {name: out3,  role: output}
      - {name: out4,  role: output}
      - {name: vdd,   role: supply}
      - {name: gnd,   role: supply}
    devices:
      - {ref: mp1, type: pmos, d: ibias, g: ibias, s: vdd, b: vdd}
      - {ref: mp2, type: pmos, d: out1,  g: ibias, s: vdd, b: vdd}
      - {ref: mn1, type: nmos, d: out1,  g: out1,  s: gnd, b: gnd}
      - {ref: mp3, type: pmos, d: out2,  g: ibias, s: vdd, b: vdd}
      - {ref: mn2, type: nmos, d: out2,  g: out2,  s: gnd, b: gnd}
      - {ref: mp4, type: pmos, d: out3,  g: ibias, s: vdd, b: vdd}
      - {ref: mn3, type: nmos, d: out3,  g: out3,  s: gnd, b: gnd}
      - {ref: mp5, type: pmos, d: out4,  g: ibias, s: vdd, b: vdd}
      - {ref: mn4, type: nmos, d: out4,  g: out4,  s: gnd, b: gnd}

  - name: resistor_bias
    category: bias_generation
    display_name: "Resistor Bias (PMOS Mirror Legs, Resistor Loads)"
    # Shared diode-connected PMOS mp1 mirrors ibias from vdd, setting a
    # reference gate voltage. Each leg i has its own complete current path:
    # mp(i+1) mirrors ibias (sourcing current from vdd) through its own
    # resistor r(i) to gnd, so out_i = I_leg * R(i) -- four independent,
    # ibias-derived bias voltages, each independently tunable via its
    # resistor value.
    ports:
      - {name: ibias, role: input}
      - {name: out1,  role: output}
      - {name: out2,  role: output}
      - {name: out3,  role: output}
      - {name: out4,  role: output}
      - {name: vdd,   role: supply}
      - {name: gnd,   role: supply}
    devices:
      - {ref: mp1, type: pmos,     d: ibias, g: ibias, s: vdd, b: vdd}
      - {ref: mp2, type: pmos,     d: out1,  g: ibias, s: vdd, b: vdd}
      - {ref: r1,  type: resistor, t1: out1, t2: gnd}
      - {ref: mp3, type: pmos,     d: out2,  g: ibias, s: vdd, b: vdd}
      - {ref: r2,  type: resistor, t1: out2, t2: gnd}
      - {ref: mp4, type: pmos,     d: out3,  g: ibias, s: vdd, b: vdd}
      - {ref: r3,  type: resistor, t1: out3, t2: gnd}
      - {ref: mp5, type: pmos,     d: out4,  g: ibias, s: vdd, b: vdd}
      - {ref: r4,  type: resistor, t1: out4, t2: gnd}

  # ─── COMPENSATION ─────────────────────────────────────────────────────────

  - name: miller_cap
    category: compensation
    display_name: "Miller Capacitor"
    ports:
      - {name: in,  role: input}
      - {name: out, role: output}
    devices:
      - {ref: c1, type: capacitor, p: in, m: out}

  - name: miller_cap_with_nulling_resistor
    category: compensation
    display_name: "Miller Cap with Nulling Resistor"
    ports:
      - {name: in,  role: input}
      - {name: out, role: output}
    devices:
      - {ref: r1, type: resistor,  t1: in,  t2: cn}
      - {ref: c1, type: capacitor, p: cn,   m: out}

  - name: indirect_compensation
    category: compensation
    display_name: "Indirect Compensation"
    # Compensation via a cascode node (no direct feedforward path).
    ports:
      - {name: in,  role: input}
      - {name: out, role: output}
    devices:
      - {ref: c1, type: capacitor, p: in,  m: ind}
      - {ref: r1, type: resistor,  t1: ind, t2: out}

  # ─── SECOND STAGE ─────────────────────────────────────────────────────────

  - name: common_source
    category: second_stage
    display_name: "Common-Source Second Stage"
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # NMOS CS amplifier with PMOS current source load
      - {ref: mn1, type: nmos, d: out,  g: in,   s: gnd, b: gnd}
      - {ref: mp1, type: pmos, d: out,  g: bias,  s: vdd, b: vdd}

  - name: common_drain
    category: second_stage
    display_name: "Common-Drain (Source Follower) Second Stage"
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      # PMOS source follower
      - {ref: mp1, type: pmos, d: vdd, g: in,   s: out,  b: vdd}
      - {ref: mn1, type: nmos, d: out, g: bias,  s: gnd,  b: gnd}

  - name: differential_ota_second_stage
    category: second_stage
    display_name: "Differential OTA Second Stage"
    # A simple folded-cascode OTA used as the second stage.
    ports:
      - {name: in,   role: input}
      - {name: out,  role: output}
      - {name: bias, role: input}
      - {name: vdd,  role: supply}
      - {name: gnd,  role: supply}
    devices:
      - {ref: mp1, type: pmos, d: d1,  g: bias, s: vdd, b: vdd}
      - {ref: mp2, type: pmos, d: out, g: bias, s: vdd, b: vdd}
      - {ref: mn1, type: nmos, d: d1,  g: in,   s: gnd, b: gnd}
      - {ref: mn2, type: nmos, d: out, g: d1,   s: gnd, b: gnd}
