# Opamp-specific SR pattern library.
#
# Patterns here either carry an opamp FBR category (input_pair, load,
# tail_current, bias_generation, compensation, second_stage, cmfb) or
# reference opamp-specific children (e.g. cascoded_differential_pair_pmos
# references differential_pair_pmos). Corresponds 1:1 with opamp_modules.yaml
# variants for the MVP composite patterns.
#
# `same_net` entries are the only required equalities; unlisted terminals
# are unconstrained.

patterns:
  # ── Opamp-adjacent structural composite (no FBR category) ─────────────────
  # cascoded_differential_pair_pmos references differential_pair_pmos (below),
  # making it opamp-specific despite having no category of its own.

  - name: cascoded_differential_pair_pmos
    devices:
      - {ref: m_dp1, type: pmos}
      - {ref: m_dp2, type: pmos}
      - {ref: m_gc1, type: pmos}
      - {ref: m_gc2, type: pmos}
    same_net:
      - [m_dp1.s, m_dp2.s]         # shared tail
      - [m_dp1.d, m_gc1.s]         # diff pair out1 → gate-coupled source1
      - [m_dp2.d, m_gc2.s]         # diff pair out2 → gate-coupled source2
    pins:
      in1: m_dp1.g
      in2: m_dp2.g
      out1: m_gc1.d
      out2: m_gc2.d
      tail: m_dp1.s
    tech_type_from: m_dp1
    children:
      - {pattern: differential_pair_pmos, devices: [m_dp1, m_dp2]}
      - {pattern: gate_coupled_pair_pmos, devices: [m_gc1, m_gc2]}

  # ─── INPUT PAIR variants ────────────────────────────────────────────────────
  # inverter_based_input is listed first so it wins input_pair
  # connectivity-score ties against differential_pair_nmos/differential_pair_pmos:
  # its mn1/mn2 (resp. mp1/mp2) pair alone also satisfies those 2-device
  # templates (shared source/bulk), producing a same-scoring spurious
  # candidate that file order then has to break.

  - name: inverter_based_input
    category: input_pair
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mp2, type: pmos}
      - {ref: mn2, type: nmos}
    same_net:
      - [mp1.d, mn1.d]   # shared out1 node (inverter 1 output)
      - [mp1.g, mn1.g]   # shared in1 node (inverter 1 input)
      - [mp2.d, mn2.d]   # shared out2 node (inverter 2 output)
      - [mp2.g, mn2.g]   # shared in2 node (inverter 2 input)
      - [mp1.s, mp1.b]   # mp1 source/bulk tied to vdd
      - [mp1.s, mp2.s]   # shared vdd node
      - [mp2.s, mp2.b]   # mp2 source/bulk tied to vdd
      - [mn1.s, mn1.b]   # mn1 source/bulk tied to gnd
      - [mn1.s, mn2.s]   # shared gnd node
      - [mn2.s, mn2.b]   # mn2 source/bulk tied to gnd
    pins:
      in1: mp1.g
      in2: mp2.g
      out1: mp1.d
      out2: mp2.d
      vdd: mp1.s
      gnd: mn1.s
    children:
      - {pattern: pmos, devices: [mp1]}
      - {pattern: nmos, devices: [mn1]}
      - {pattern: pmos, devices: [mp2]}
      - {pattern: nmos, devices: [mn2]}

  - name: differential_pair_nmos
    category: input_pair
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: nmos}
      - {ref: m2, type: nmos}
    same_net:
      - [m1.s, m2.s]   # shared tail node
      - [m1.b, m2.b]   # shared bulk node
    pins:
      in1: m1.g
      in2: m2.g
      out1: m1.d
      out2: m2.d
      tail: m1.s
      bulk: m1.b
    tech_type_from: m1   # tech_type = "n"
    children:
      - {pattern: nmos, devices: [m1]}
      - {pattern: nmos, devices: [m2]}

  - name: differential_pair_pmos
    category: input_pair
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: pmos}
      - {ref: m2, type: pmos}
    same_net:
      - [m1.s, m2.s]   # shared tail node
      - [m1.b, m2.b]   # shared bulk node
    pins:
      in1: m1.g
      in2: m2.g
      out1: m1.d
      out2: m2.d
      tail: m1.s
      bulk: m1.b
    tech_type_from: m1   # tech_type = "p"
    children:
      - {pattern: pmos, devices: [m1]}
      - {pattern: pmos, devices: [m2]}

  - name: differential_pair_nmos_degenerated
    category: input_pair
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: nmos}
      - {ref: m2, type: nmos}
      - {ref: r1, type: resistor}
      - {ref: r2, type: resistor}
    same_net:
      - [m1.s, m1.b, r1.t1]   # m1's source/bulk tied to its degeneration resistor
      - [m2.s, m2.b, r2.t1]   # m2's source/bulk tied to its degeneration resistor
      - [r1.t2, r2.t2]        # shared tail node
    pins:
      in1: m1.g
      in2: m2.g
      out1: m1.d
      out2: m2.d
      tail: r1.t2
    tech_type_from: m1   # tech_type = "n"

  - name: differential_pair_pmos_degenerated
    category: input_pair
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: pmos}
      - {ref: m2, type: pmos}
      - {ref: r1, type: resistor}
      - {ref: r2, type: resistor}
    same_net:
      - [m1.s, m1.b, r1.t1]   # m1's source/bulk tied to its degeneration resistor
      - [m2.s, m2.b, r2.t1]   # m2's source/bulk tied to its degeneration resistor
      - [r1.t2, r2.t2]        # shared tail node
    pins:
      in1: m1.g
      in2: m2.g
      out1: m1.d
      out2: m2.d
      tail: r1.t2
    tech_type_from: m1   # tech_type = "p"

  # ─── LOAD variants ──────────────────────────────────────────────────────────

  - name: active_load_pmos
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: pmos}
      - {ref: m2, type: pmos}
    same_net:
      - [m1.d, m1.g]   # m1 is diode-connected
      - [m1.g, m2.g]   # m2 mirrors m1's gate
      - [m1.s, m2.s]   # shared vdd connection
      - [m1.b, m2.b]
    pins:
      in1: m1.d
      in2: m2.d
      vdd: m1.s
    tech_type_from: m1   # tech_type = "p"

  - name: active_load_nmos
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: nmos}
      - {ref: m2, type: nmos}
    same_net:
      - [m1.d, m1.g]   # m1 is diode-connected
      - [m1.g, m2.g]   # m2 mirrors m1's gate
      - [m1.s, m2.s]   # shared gnd connection
      - [m1.b, m2.b]
    pins:
      in1: m1.d
      in2: m2.d
      gnd: m1.s
    tech_type_from: m1   # tech_type = "n"

  - name: resistor_load_vdd
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: r1, type: resistor}
      - {ref: r2, type: resistor}
    same_net:
      - [r1.t1, r2.t1]   # shared vdd connection
    pins:
      in1: r1.t2
      in2: r2.t2
      vdd: r1.t1

  - name: resistor_load_gnd
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: r1, type: resistor}
      - {ref: r2, type: resistor}
    same_net:
      - [r1.t2, r2.t2]   # shared gnd connection
    pins:
      in1: r1.t1
      in2: r2.t1
      gnd: r1.t2

  - name: current_source_load_pmos
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: pmos}
      - {ref: m2, type: pmos}
    same_net:
      - [m1.g, m2.g]   # shared bias1 gate
      - [m1.s, m2.s]   # shared vdd connection
      - [m1.b, m2.b]
    pins:
      in1: m1.d
      in2: m2.d
      bias1: m1.g
      vdd: m1.s
    tech_type_from: m1   # tech_type = "p"

  - name: current_source_load_nmos
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: nmos}
      - {ref: m2, type: nmos}
    same_net:
      - [m1.g, m2.g]   # shared bias1 gate
      - [m1.s, m2.s]   # shared gnd connection
      - [m1.b, m2.b]
    pins:
      in1: m1.d
      in2: m2.d
      bias1: m1.g
      gnd: m1.s
    tech_type_from: m1   # tech_type = "n"

  - name: folded_cascode_load_nmos_input_single_output
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mp3, type: pmos}
      - {ref: mp4, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
      - {ref: mn3, type: nmos}
      - {ref: mn4, type: nmos}
    same_net:
      - [mp1.g, mp2.g]                              # shared bias1 (folding-source gates)
      - [mp1.s, mp1.b, mp2.s, mp2.b, mp3.b, mp4.b]  # shared vdd
      - [mp1.d, mp3.s]                              # in1 folding node
      - [mp2.d, mp4.s]                              # in2 folding node
      - [mp3.g, mp4.g]                              # shared bias2 (cascode gates)
      - [mp3.d, mn1.d, mn1.g, mn2.g]                # internal_0 (NMOS mirror gate node)
      - [mp4.d, mn2.d]                              # single-ended output node
      - [mn1.s, mn3.d, mn3.g]                       # internal_1 (reference-leg cascode node)
      - [mn2.s, mn4.d]                              # internal_2 (output-leg cascode node)
      - [mn1.b, mn2.b, mn3.s, mn3.b, mn4.s, mn4.b]  # shared gnd
    pins:
      in1: mp1.d
      in2: mp2.d
      out: mp4.d
      bias1: mp1.g
      bias2: mp3.g
      vdd: mp1.s
      gnd: mn1.b

  - name: folded_cascode_load_pmos_input_single_output
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mp3, type: pmos}
      - {ref: mp4, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
      - {ref: mn3, type: nmos}
      - {ref: mn4, type: nmos}
    same_net:
      - [mp1.d, mp1.g, mp2.g, mp3.s]                # internal_0 (PMOS mirror gate node, mp1 diode-connected)
      - [mp1.s, mp1.b, mp2.s, mp2.b, mp3.b, mp4.b]  # shared vdd
      - [mp2.d, mp4.s]                              # internal_1 (output-leg cascode node)
      - [mp3.d, mp3.g, mp4.g, mn1.d]                # internal_2 (mp3 diode-connected; shared bias for mp4/mn1)
      - [mp4.d, mn2.d]                              # single-ended output node
      - [mn1.g, mn2.g]                              # shared bias2 (cascode gates)
      - [mn1.s, mn3.d]                              # in1 folding node
      - [mn2.s, mn4.d]                              # in2 folding node
      - [mn3.g, mn4.g]                              # shared bias1 (folding-sink gates)
      - [mn1.b, mn2.b, mn3.s, mn3.b, mn4.s, mn4.b]  # shared gnd
    pins:
      in1: mn3.d
      in2: mn4.d
      out: mp4.d
      bias1: mn3.g
      bias2: mn1.g
      vdd: mp1.s
      gnd: mn1.b

  - name: folded_cascode_load_nmos_input_differential_output
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mp3, type: pmos}
      - {ref: mp4, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
      - {ref: mn3, type: nmos}
      - {ref: mn4, type: nmos}
    # mp1/mp2 are PMOS folding current sources (gated bias1), connecting in1/in2
    # to mp3/mp4 cascode devices (gated bias2) which drive out1/out2.
    # mn1/mn2 are NMOS cascode devices (gated bias3) on internal_0/internal_1.
    # mn3/mn4 are bias_cmfb-gated current sinks; bias_cmfb is shared.
    same_net:
      - [mp1.g, mp2.g]                                    # shared bias1
      - [mp3.g, mp4.g]                                    # shared bias2
      - [mn1.g, mn2.g]                                    # shared bias3
      - [mn3.g, mn4.g]                                    # shared bias_cmfb
      - [mp1.d, mp3.s]                                    # in1 folding node
      - [mp2.d, mp4.s]                                    # in2 folding node
      - [mp3.d, mn1.d]                                    # out1
      - [mp4.d, mn2.d]                                    # out2
      - [mn1.s, mn3.d]                                    # internal_0
      - [mn2.s, mn4.d]                                    # internal_1
      - [mp1.s, mp1.b, mp2.s, mp2.b, mp3.b, mp4.b]      # vdd
      - [mn1.b, mn2.b, mn3.s, mn3.b, mn4.s, mn4.b]      # gnd
    pins:
      in1: mp1.d
      in2: mp2.d
      out1: mp3.d
      out2: mp4.d
      bias1: mp1.g
      bias2: mp3.g
      bias3: mn1.g
      bias_cmfb: mn3.g
      vdd: mp1.s
      gnd: mn1.b

  - name: folded_cascode_load_pmos_input_differential_output
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mp3, type: pmos}
      - {ref: mp4, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
      - {ref: mn3, type: nmos}
      - {ref: mn4, type: nmos}
    # Mirror image of folded_cascode_load_nmos_input_differential_output.
    # mn3/mn4 are NMOS folding current sinks (gated bias1), connecting in1/in2
    # to mn1/mn2 cascode devices (gated bias2) which drive out1/out2.
    # mp3/mp4 are PMOS cascode devices (gated bias3) on internal_0/internal_1.
    # mp1/mp2 are bias_cmfb-gated current sources; bias_cmfb is shared.
    same_net:
      - [mn3.g, mn4.g]                                    # shared bias1
      - [mn1.g, mn2.g]                                    # shared bias2
      - [mp3.g, mp4.g]                                    # shared bias3
      - [mp1.g, mp2.g]                                    # shared bias_cmfb
      - [mn3.d, mn1.s]                                    # in1 folding node
      - [mn4.d, mn2.s]                                    # in2 folding node
      - [mp3.d, mn1.d]                                    # out1
      - [mp4.d, mn2.d]                                    # out2
      - [mp1.d, mp3.s]                                    # internal_0
      - [mp2.d, mp4.s]                                    # internal_1
      - [mp1.s, mp1.b, mp2.s, mp2.b, mp3.b, mp4.b]      # vdd
      - [mn1.b, mn2.b, mn3.s, mn3.b, mn4.s, mn4.b]      # gnd
    pins:
      in1: mn3.d
      in2: mn4.d
      out1: mp3.d
      out2: mp4.d
      bias1: mn3.g
      bias2: mn1.g
      bias3: mp3.g
      bias_cmfb: mp1.g
      vdd: mp1.s
      gnd: mn1.b

  - name: telescopic_cascode_load_pmos
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
      - {ref: mn3, type: nmos}
      - {ref: mn4, type: nmos}
    same_net:
      - [mp1.g, mp2.g]                              # shared bias1 (cascode gates)
      - [mp1.b, mp2.b]                              # shared vdd (bulk only -- sources tie to in1/in2)
      - [mp1.d, mn1.d, mn1.g, mn2.g]                # internal_0 (NMOS mirror gate node, mn1 diode-connected)
      - [mp2.d, mn2.d]                              # single-ended output node
      - [mn1.s, mn3.d, mn3.g]                       # internal_1 (reference-leg cascode node, mn3 diode-connected)
      - [mn2.s, mn4.d]                              # internal_2 (output-leg cascode node)
      - [mn1.b, mn2.b, mn3.s, mn3.b, mn4.s, mn4.b]  # shared gnd
    pins:
      in1: mp1.s
      in2: mp2.s
      out: mp2.d
      bias1: mp1.g
      vdd: mp1.b
      gnd: mn1.b

  - name: telescopic_cascode_load_nmos
    category: load
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mp3, type: pmos}
      - {ref: mp4, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
    same_net:
      - [mp1.d, mp1.g, mp2.g, mp3.s]                # internal_0 (PMOS mirror gate node, mp1 diode-connected)
      - [mp1.s, mp1.b, mp2.s, mp2.b, mp3.b, mp4.b]  # shared vdd
      - [mp2.d, mp4.s]                              # internal_1 (output-leg cascode node)
      - [mp3.d, mp3.g, mp4.g, mn1.d]                # internal_2 (mp3 diode-connected; shared bias for mp4/mn1)
      - [mp4.d, mn2.d]                              # single-ended output node
      - [mn1.g, mn2.g]                              # shared bias1 (cascode gates)
      - [mn1.b, mn2.b]                              # shared gnd
    pins:
      in1: mn1.s
      in2: mn2.s
      out: mp4.d
      bias1: mn1.g
      vdd: mp1.s
      gnd: mn1.b

  # ─── TAIL CURRENT variants ──────────────────────────────────────────────────

  - name: current_mirror_tail_nmos
    category: tail_current
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: nmos}
      - {ref: m2, type: nmos}
    same_net:
      - [m1.d, m1.g]   # m1 is diode-connected (bias reference)
      - [m1.g, m2.g]   # m2 mirrors m1's gate
      - [m1.s, m2.s]   # shared gnd connection
      - [m1.b, m2.b]
    pins:
      bias: m1.g
      out: m2.d
      gnd: m1.s
    tech_type_from: m1   # tech_type = "n"

  - name: current_mirror_tail_pmos
    category: tail_current
    circuit_block: gain_stage_1
    devices:
      - {ref: m1, type: pmos}
      - {ref: m2, type: pmos}
    same_net:
      - [m1.d, m1.g]   # m1 is diode-connected (bias reference)
      - [m1.g, m2.g]   # m2 mirrors m1's gate
      - [m1.s, m2.s]   # shared vdd connection
      - [m1.b, m2.b]
    pins:
      bias: m1.g
      out: m2.d
      vdd: m1.s
    tech_type_from: m1   # tech_type = "p"

  - name: cascode_current_mirror_tail_pmos
    category: tail_current
    circuit_block: gain_stage_1
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mp3, type: pmos}
      - {ref: mp4, type: pmos}
    same_net:
      - [mp1.d, mp1.g, mp2.g, mp3.s]                # internal_0 (mp1 diode-connected; cascode-gate bias node)
      - [mp1.s, mp1.b, mp2.s, mp2.b, mp3.b, mp4.b]  # shared vdd
      - [mp3.d, mp3.g, mp4.g]                       # bias (mp3 diode-connected; mirror-gate bias node)
      - [mp2.d, mp4.s]                              # internal_1 (output-leg cascode node)
    pins:
      bias: mp3.g
      out: mp4.d
      vdd: mp1.s

  - name: cascode_current_mirror_tail_nmos
    category: tail_current
    circuit_block: gain_stage_1
    devices:
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
      - {ref: mn3, type: nmos}
      - {ref: mn4, type: nmos}
    same_net:
      - [mn1.d, mn1.g, mn2.g, mn3.s]                # internal_0 (mn1 diode-connected; cascode-gate bias node)
      - [mn1.s, mn1.b, mn2.s, mn2.b, mn3.b, mn4.b]  # shared gnd
      - [mn3.d, mn3.g, mn4.g]                       # bias (mn3 diode-connected; mirror-gate bias node)
      - [mn2.d, mn4.s]                              # internal_1 (output-leg cascode node)
    pins:
      bias: mn3.g
      out: mn4.d
      gnd: mn1.s

  - name: resistor_tail_vdd
    category: tail_current
    circuit_block: gain_stage_1
    devices:
      - {ref: r1, type: resistor}
    pins:
      out: r1.t2
      vdd: r1.t1
    # Rejects any resistor whose t1 isn't the global vdd! rail -- without
    # this, every resistor in the netlist (e.g. resistor_load_*'s,
    # resistor_bias's, a degenerated input pair's) would match this
    # unconstrained 1-device template.
    hook: "circuitgenome.recognizer.hooks:resistor_tail_vdd_check"

  - name: resistor_tail_gnd
    category: tail_current
    circuit_block: gain_stage_1
    devices:
      - {ref: r1, type: resistor}
    pins:
      out: r1.t1
      gnd: r1.t2
    # Mirror of resistor_tail_vdd's check: rejects any resistor whose t2
    # isn't the global gnd! rail.
    hook: "circuitgenome.recognizer.hooks:resistor_tail_gnd_check"

  # ─── BIAS GENERATION variants ────────────────────────────────────────────────

  - name: diode_connected_mosfet_bias
    category: bias_generation
    circuit_block: bias
    devices:
      - {ref: mref, type: nmos}
    same_net:
      - [mref.d, mref.g]   # mref is diode-connected (shared bias reference)
    pins:
      ibias: mref.g
      gnd: mref.s
    tech_type_from: mref   # tech_type = "n"
    # Discovers however many output "legs" (nmos+pmos pairs mirroring mref)
    # are present in the netlist and appends their devices/pins.
    hook: "circuitgenome.recognizer.hooks:diode_connected_mosfet_bias_legs"

  - name: magic_battery_bias
    category: bias_generation
    circuit_block: bias
    devices:
      - {ref: mref, type: pmos}
    same_net:
      - [mref.d, mref.g]   # mref is diode-connected (shared bias reference)
    pins:
      ibias: mref.g
      vdd: mref.s
    tech_type_from: mref   # tech_type = "p"
    # Discovers however many output "legs" (pmos+nmos pairs mirroring mref)
    # are present in the netlist and appends their devices/pins.
    hook: "circuitgenome.recognizer.hooks:magic_battery_bias_legs"

  - name: resistor_bias
    category: bias_generation
    circuit_block: bias
    devices:
      - {ref: mref, type: pmos}
    same_net:
      - [mref.d, mref.g]   # mref is diode-connected (shared bias reference)
    pins:
      ibias: mref.g
      vdd: mref.s
    tech_type_from: mref   # tech_type = "p"
    # Discovers however many output "legs" (pmos mirror + resistor pairs)
    # are present in the netlist and appends their devices/pins.
    hook: "circuitgenome.recognizer.hooks:resistor_bias_legs"

  # ─── COMPENSATION variants ───────────────────────────────────────────────────

  - name: miller_cap
    category: compensation
    circuit_block: compensation
    devices:
      - {ref: c1, type: capacitor}
    pins:
      in: c1.p
      out: c1.m

  - name: miller_cap_with_nulling_resistor
    category: compensation
    circuit_block: compensation
    devices:
      - {ref: r1, type: resistor}
      - {ref: c1, type: capacitor}
    # r1.t2 and c1.p share the internal cn node.
    same_net:
      - [r1.t2, c1.p]
    pins:
      in: r1.t1
      out: c1.m

  - name: indirect_compensation
    category: compensation
    circuit_block: compensation
    devices:
      - {ref: c1, type: capacitor}
      - {ref: r1, type: resistor}
    # c1.m and r1.t1 share the internal ind node.
    same_net:
      - [c1.m, r1.t1]
    pins:
      in: c1.p
      out: r1.t2

  # ─── SECOND STAGE variants ───────────────────────────────────────────────────

  - name: common_source
    category: second_stage
    circuit_block: gain_stage_2
    devices:
      - {ref: mn1, type: nmos}
      - {ref: mp1, type: pmos}
    # Both drains share the output node.
    same_net:
      - [mn1.d, mp1.d]
    pins:
      in: mn1.g
      bias: mp1.g
      out: mn1.d

  - name: common_drain
    category: second_stage
    circuit_block: gain_stage_2
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mn1, type: nmos}
    # PMOS source == NMOS drain (shared output). PMOS drain == PMOS bulk (vdd).
    same_net:
      - [mp1.s, mn1.d]
      - [mp1.d, mp1.b]
    pins:
      in: mp1.g
      bias: mn1.g
      out: mp1.s

  - name: differential_ota_second_stage
    category: second_stage
    circuit_block: gain_stage_2
    devices:
      - {ref: mp1, type: pmos}
      - {ref: mp2, type: pmos}
      - {ref: mn1, type: nmos}
      - {ref: mn2, type: nmos}
    # mp1.d == mn1.d == mn2.g  (internal d1 node: cross-coupled gain stage)
    # mp1.g == mp2.g            (shared bias gate)
    # mp1.s == mp1.b == mp2.s == mp2.b  (all tied to vdd)
    # mn1.s == mn1.b == mn2.s == mn2.b  (all tied to gnd)
    # mp2.d == mn2.d            (shared output)
    same_net:
      - [mp1.d, mn1.d, mn2.g]
      - [mp1.g, mp2.g]
      - [mp1.s, mp1.b, mp2.s, mp2.b]
      - [mn1.s, mn1.b, mn2.s, mn2.b]
      - [mp2.d, mn2.d]
    pins:
      in: mn1.g
      bias: mp1.g
      out: mp2.d

  # ─── CMFB variants ───────────────────────────────────────────────────────────

  - name: resistive_sense_cmfb
    category: cmfb
    circuit_block: cmfb
    devices:
      - {ref: r1, type: resistor}
      - {ref: r2, type: resistor}
      - {ref: m1, type: nmos}
      - {ref: m2, type: nmos}
      - {ref: m3, type: pmos}
      - {ref: m4, type: pmos}
      - {ref: m5, type: nmos}
    # r1/r2 average in1/in2 at internal "sense" node; 5T OTA (m1/m2 diff pair,
    # m3 diode-connected PMOS mirror ref, m4 mirror output, m5 tail) compares
    # sense to vref and drives the output.
    same_net:
      - [r1.t2, r2.t2, m1.g]      # sense: resistive averager → diff pair input
      - [m1.d, m3.d, m3.g, m4.g]  # d1: diode-connected m3, mirror gate for m4
      - [m1.s, m2.s, m5.d]         # tail
      - [m2.d, m4.d]               # shared output
      - [m3.s, m3.b, m4.s, m4.b]  # vdd
      - [m1.b, m2.b, m5.s, m5.b]  # gnd
    pins:
      in1: r1.t1
      in2: r2.t1
      vref: m2.g
      bias: m5.g
      out: m2.d

  - name: dda_cmfb
    category: cmfb
    circuit_block: cmfb
    devices:
      - {ref: m1, type: nmos}
      - {ref: m2, type: nmos}
      - {ref: m3, type: nmos}
      - {ref: m4, type: nmos}
      - {ref: m5, type: pmos}
      - {ref: m6, type: pmos}
      - {ref: m7, type: nmos}
      - {ref: m8, type: nmos}
    # Two source-coupled pairs (m1/m2 on tail1, m3/m4 on tail2) cross-coupled
    # to a shared diode-connected PMOS mirror (m5 ref, m6 output).  Output
    # responds to (in1 + in2) - 2*vref.
    same_net:
      - [m1.d, m3.d, m5.d, m5.g, m6.g]           # da: diode-connected m5 + cross-coupling
      - [m2.d, m4.d, m6.d]                          # shared output
      - [m1.s, m2.s, m7.d]                          # tail1
      - [m3.s, m4.s, m8.d]                          # tail2
      - [m2.g, m4.g]                                 # shared vref gate
      - [m7.g, m8.g]                                 # shared bias gate
      - [m5.s, m5.b, m6.s, m6.b]                   # vdd
      - [m1.b, m2.b, m3.b, m4.b, m7.s, m7.b, m8.s, m8.b]  # gnd
    pins:
      in1: m1.g
      in2: m3.g
      vref: m2.g
      bias: m7.g
      out: m2.d
