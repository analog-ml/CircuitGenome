# PTM 32nm HP (BSIM4 bulk, metal-gate/high-K/strained-Si)
# Level-1 parameters (mu_cox, vth, lam) EXTRACTED with ngspice from the BSIM4
# card models/ptm_32nm_HP.pm by tools/extract_tech.py.
# Source: ASU Predictive Technology Model (PTM), https://ptm.asu.edu
#   W. Zhao, Y. Cao, "New Generation of Predictive Technology Model for
#   Sub-45nm Design Exploration," ISQED 2006.  Mirror: https://mec.umn.edu/ptm
# Extraction point: Vdd=0.9 V, W=1.0 um, L=0.064 um
#   (effective square-law fit; mu_cox/lam are bias/length dependent).
name: ptm32_hp
description: "PTM 32nm HP (BSIM4 bulk, metal-gate/high-K/strained-Si)"

nmos:
  mu_cox: 3.311257e-04   # A/V²  (effective µn·Cox)
  vth: 0.4071            # V
  lam: 0.2255            # 1/V

pmos:
  mu_cox: 1.218637e-04   # A/V²  (effective µp·Cox)
  vth: -0.4317           # V
  lam: 0.3788            # 1/V

width:
  min: 0.05
  max: 60.0
  step: 0.05

length:
  min: 0.032
  max: 0.6
  step: 0.002

cap:
  min_pf: 0.01
  max_pf: 10.0
  step_pf: 0.01
