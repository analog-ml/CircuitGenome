# PTM 22nm HP (BSIM4 bulk, metal-gate/high-K/strained-Si)
# Level-1 parameters (mu_cox, vth, lam) EXTRACTED with ngspice from the BSIM4
# card models/ptm_22nm_HP.pm by tools/extract_tech.py.
# Source: ASU Predictive Technology Model (PTM), https://ptm.asu.edu
#   W. Zhao, Y. Cao, "New Generation of Predictive Technology Model for
#   Sub-45nm Design Exploration," ISQED 2006.  Mirror: https://mec.umn.edu/ptm
# Extraction point: Vdd=0.8 V, W=1.0 um, L=0.044 um
#   (effective square-law fit; mu_cox/lam are bias/length dependent).
name: ptm22_hp
description: "PTM 22nm HP (BSIM4 bulk, metal-gate/high-K/strained-Si)"
spice_model: models/ptm_22nm_HP.pm   # BSIM4 card for SPICE verification

nmos:
  mu_cox: 2.663423e-04   # A/V²  (effective µn·Cox)
  vth: 0.4123            # V
  lam: 0.3233            # 1/V

pmos:
  mu_cox: 8.809259e-05   # A/V²  (effective µp·Cox)
  vth: -0.3961           # V
  lam: 0.5415            # 1/V

width:
  min: 0.05
  max: 50.0
  step: 0.05

length:
  min: 0.022
  max: 0.5
  step: 0.002

cap:
  min_pf: 0.01
  max_pf: 10.0
  step_pf: 0.01
